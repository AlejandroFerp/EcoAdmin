<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo circular verde (degradado) -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d4620;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#grad1)"/>
  
  <!-- Símbolo de reciclaje / gestión ambiental -->
  <!-- Flecha 1 (arriba derecha) -->
  <path d="M 60 30 L 75 45 L 65 50 Q 60 50 58 45 Z" fill="white" opacity="0.9"/>
  
  <!-- Flecha 2 (abajo derecha) -->
  <path d="M 65 60 L 70 75 L 58 70 Q 55 65 60 58 Z" fill="white" opacity="0.8"/>
  
  <!-- Flecha 3 (izquierda) -->
  <path d="M 25 50 L 35 35 L 42 48 Q 40 55 32 58 Z" fill="white" opacity="0.85"/>
  
  <!-- Circulito central -->
  <circle cx="50" cy="50" r="8" fill="white" opacity="0.7"/>
  
  <!-- Texto pequeño de ECO -->
  <text x="50" y="75" font-size="12" font-weight="bold" text-anchor="middle" fill="white" opacity="0.8">ECO</text>
</svg>
