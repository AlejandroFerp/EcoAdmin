# PostgreSQL por defecto (con variables de entorno)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ecoadmin}
spring.datasource.username=${DATABASE_USER:ecoadmin}
spring.datasource.password=${DATABASE_PASSWORD:ecoadmin123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false

# Mail (configurar con credenciales reales antes de usar)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
ecoadmin.mail.from=${MAIL_USERNAME:noreply@ecoadmin.com}

# Admin inicial (configurar via variables de entorno en produccion)
ecoadmin.admin.email=${ADMIN_EMAIL:admin@ecoadmin.com}
ecoadmin.admin.password=${ADMIN_PASSWORD:admin123}

# Evita URL rewriting de jsessionid (redirect loop en /login)
server.servlet.session.tracking-modes=cookie