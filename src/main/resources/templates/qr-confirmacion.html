<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layouts/main :: layout('shipments', 'EcoAdmin — Entrada QR', 'Entrada registrada', ~{::pageContent}, ~{::pageScripts})}">

<body>
    <th:block th:fragment="pageContent">
        <main class="page-main flex items-center justify-center min-h-[70vh]">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 max-w-md w-full p-8 text-center">

                <!-- Icono éxito -->
                <div class="flex justify-center mb-5">
                    <span class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-50">
                        <svg class="w-9 h-9 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </span>
                </div>

                <!-- Título -->
                <h1 class="text-xl font-semibold text-slate-800 mb-1" th:if="${!yaRegistrado}">
                    Entrada registrada
                </h1>
                <h1 class="text-xl font-semibold text-slate-800 mb-1" th:if="${yaRegistrado}">
                    Traslado ya en tránsito
                </h1>

                <!-- Estado -->
                <div class="inline-block px-3 py-1 rounded-full text-sm font-medium mb-4"
                     th:classappend="${nuevoEstado == 'EN_TRANSITO'} ? 'bg-blue-100 text-blue-700' : 'bg-emerald-100 text-emerald-700'"
                     th:text="${nuevoEstado}">EN_TRANSITO</div>

                <!-- Info traslado -->
                <dl class="text-left text-sm divide-y divide-slate-100 border border-slate-100 rounded-xl mb-6">
                    <div class="flex gap-2 px-4 py-2.5">
                        <dt class="text-slate-400 w-28 shrink-0">Traslado #</dt>
                        <dd class="font-medium text-slate-800" th:text="${traslado.id}">—</dd>
                    </div>
                    <div class="flex gap-2 px-4 py-2.5" th:if="${traslado.centroProductor != null}">
                        <dt class="text-slate-400 w-28 shrink-0">Origen</dt>
                        <dd class="text-slate-700" th:text="${traslado.centroProductor.nombre}">—</dd>
                    </div>
                    <div class="flex gap-2 px-4 py-2.5" th:if="${traslado.centroGestor != null}">
                        <dt class="text-slate-400 w-28 shrink-0">Destino</dt>
                        <dd class="text-slate-700" th:text="${traslado.centroGestor.nombre}">—</dd>
                    </div>
                    <div class="flex gap-2 px-4 py-2.5" th:if="${traslado.transportista != null}">
                        <dt class="text-slate-400 w-28 shrink-0">Transportista</dt>
                        <dd class="text-slate-700" th:text="${traslado.transportista.nombre}">—</dd>
                    </div>
                    <div class="flex gap-2 px-4 py-2.5" th:if="${traslado.residuo != null}">
                        <dt class="text-slate-400 w-28 shrink-0">Residuo</dt>
                        <dd class="text-slate-700" th:text="${traslado.residuo.descripcion ?: traslado.residuo.codigoLER}">—</dd>
                    </div>
                </dl>

                <!-- Botones -->
                <div class="flex flex-col gap-2">
                    <a href="/shipments"
                       class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl bg-[#3b82f6] text-white text-sm font-medium hover:bg-blue-600 transition-colors">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                        </svg>
                        Ver detalle del traslado
                    </a>
                    <a href="/qr/scanner"
                       class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl border border-slate-200 text-slate-600 text-sm hover:bg-slate-50 transition-colors">
                        Escanear otro QR
                    </a>
                </div>
            </div>
        </main>
    </th:block>

    <th:block th:fragment="pageScripts"></th:block>
</body>
</html>
