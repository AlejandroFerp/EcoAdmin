<!DOCTYPE html>
<html lang="es" data-theme="light"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EcoAdmin — Usuarios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>*{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gray-100 min-h-screen" data-theme="light">

<!-- SIDEBAR -->
<aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 flex flex-col -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
    <div class="flex items-center gap-3 px-6 h-16 border-b border-gray-100 shrink-0">
        <div class="w-8 h-8 rounded-lg bg-[#1a6b3c] flex items-center justify-center text-white font-bold">🌿</div>
        <span class="font-bold text-gray-900">EcoAdmin</span>
    </div>
    <nav class="flex-1 overflow-y-auto p-3 space-y-0.5">
        <p class="px-3 pb-1 pt-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Principal</p>
        <a th:href="@{/public/index}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Dashboard
        </a>
        <p class="px-3 pb-1 pt-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Gestion</p>
        <a th:href="@{/public/centros}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
            Centros
        </a>
        <a th:href="@{/public/residuos}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            Residuos
        </a>
        <a th:href="@{/public/traslados}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            Traslados
        </a>
        <a th:href="@{/public/usuarios}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-green-50 text-green-700 transition-colors">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            Usuarios
        </a>
        <a th:href="@{/public/direcciones}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            Direcciones
        </a>
    </nav>
    <div class="shrink-0 border-t border-gray-100 p-4">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-green-800 text-xs font-bold shrink-0">A</div>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-gray-900 truncate" sec:authentication="name">Admin</p>
                <p class="text-xs text-gray-400">Administrador</p>
            </div>
            <a th:href="@{/logout}" title="Cerrar sesion" class="text-gray-400 hover:text-red-500 transition-colors shrink-0">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            </a>
        </div>
    </div>
</aside>
<div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-40 lg:hidden hidden" onclick="closeSidebar()"></div>

<!-- MAIN -->
<div class="lg:ml-64 min-h-screen flex flex-col">
    <header class="sticky top-0 z-30 bg-white border-b border-gray-200 flex items-center h-16 px-4 sm:px-6 gap-3 shrink-0">
        <button type="button" onclick="openSidebar()" class="lg:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="flex-1"><h1 class="text-sm sm:text-base font-semibold text-gray-900">Usuarios del sistema</h1></div>
        <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-green-700 text-xs font-bold">A</div>
    </header>
    <main class="flex-1 p-4 sm:p-6">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <div>
                <h2 class="text-xl font-bold text-gray-900">Usuarios</h2>
                <p class="text-sm text-gray-500 mt-0.5">Cuentas registradas en el sistema</p>
            </div>
            <button type="button" onclick="abrirCrear()"
                    class="btn bg-[#1a6b3c] hover:bg-[#155c33] text-white border-none normal-case shrink-0">
                + Nuevo Usuario
            </button>
        </div>
        <div class="mb-4">
            <div class="relative w-full sm:max-w-xs">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/></svg>
                <input type="text" id="busqueda" placeholder="Buscar usuarios..." oninput="filtrar()"
                       class="input input-sm w-full pl-9 bg-white border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-x-auto">
            <table class="table table-zebra table-sm w-full">
                <thead>
                    <tr class="text-xs uppercase text-gray-400 border-b border-gray-100">
                        <th class="w-12">ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th class="text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaCuerpo">
                    <tr><td colspan="5" class="text-center py-12 text-gray-400">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mt-4">
            <span class="text-xs text-gray-500" id="infoReg"></span>
            <div class="join" id="pgBotones"></div>
        </div>
    </main>
</div>

<!-- MODAL FORM -->
<div id="modalForm" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
    <div class="relative p-4 w-full max-w-md">
        <div class="relative bg-white rounded-2xl shadow-xl">
            <div class="flex items-center justify-between p-5 border-b border-gray-100">
                <h3 id="modalTitulo" class="text-base font-semibold text-gray-900">Crear Usuario</h3>
                <button type="button" data-modal-hide="modalForm" class="text-gray-400 hover:text-gray-700 rounded-lg p-1.5 hover:bg-gray-100">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg>
                </button>
            </div>
            <div class="p-5 space-y-4">
                <input type="hidden" id="itemId">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
                    <input type="text" id="fNombre" class="input input-bordered input-sm w-full" placeholder="Nombre completo">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
                    <input type="email" id="fEmail" class="input input-bordered input-sm w-full" placeholder="usuario@empresa.com">
                </div>
                <div id="bloquePassword">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contrasena *</label>
                    <input type="password" id="fPassword" class="input input-bordered input-sm w-full" placeholder="Minimo 6 caracteres">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Rol</label>
                    <select id="fRol" class="select select-bordered select-sm w-full">
                        <option value="PRODUCTOR">PRODUCTOR</option>
                        <option value="GESTOR">GESTOR</option>
                        <option value="TRANSPORTISTA">TRANSPORTISTA</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 p-5 border-t border-gray-100">
                <button type="button" data-modal-hide="modalForm" class="btn btn-ghost btn-sm normal-case">Cancelar</button>
                <button type="button" onclick="guardar()" class="btn btn-sm bg-[#1a6b3c] hover:bg-[#155c33] text-white border-none normal-case px-6">Guardar</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL BORRAR -->
<div id="modalBorrar" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
    <div class="relative p-4 w-full max-w-sm">
        <div class="relative bg-white rounded-2xl shadow-xl p-6 text-center">
            <button type="button" data-modal-hide="modalBorrar" class="absolute top-3 right-3 text-gray-400 hover:text-gray-700 rounded-lg p-1 hover:bg-gray-100">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg>
            </button>
            <div class="text-5xl mb-3">🗑️</div>
            <h6 class="text-base font-bold mb-1">Eliminar usuario?</h6>
            <p class="text-gray-500 text-sm mb-5">Esta accion no se puede deshacer.</p>
            <div class="flex justify-center gap-3">
                <button type="button" data-modal-hide="modalBorrar" class="btn btn-sm btn-outline normal-case">Cancelar</button>
                <button type="button" onclick="borrar()" class="btn btn-sm btn-error text-white normal-case">Eliminar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
<script>
function openSidebar()  { document.getElementById('sidebar').classList.remove('-translate-x-full'); document.getElementById('sidebarOverlay').classList.remove('hidden'); }
function closeSidebar() { document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('sidebarOverlay').classList.add('hidden'); }

let todos = [], borrandoId, pagina = 1, filtro = '';
const POR_PAGINA = 15;
let mForm, mBorrar;

function initModales() {
    const elF = document.getElementById('modalForm');
    const elB = document.getElementById('modalBorrar');
    if (elF && typeof Modal !== 'undefined') {
        mForm   = new Modal(elF, { backdrop:'dynamic', closable:true });
        mBorrar = new Modal(elB, { backdrop:'dynamic', closable:true });
    }
}

document.addEventListener('DOMContentLoaded', () => { initModales(); cargar(); });
document.addEventListener('htmx:afterSwap',   () => { initModales(); if (document.getElementById('tablaCuerpo')) cargar(); });

async function cargar() {
    const res = await fetch('/api/usuarios');
    todos = await res.json();
    pagina = 1;
    renderTabla();
}

function filtrar() {
    filtro = document.getElementById('busqueda').value.toLowerCase();
    pagina = 1;
    renderTabla();
}

const rolBadge = { ADMIN:'badge-error', GESTOR:'badge-warning', PRODUCTOR:'badge-info', TRANSPORTISTA:'badge-success' };

function renderTabla() {
    const lista = todos.filter(u =>
        (u.nombre || '').toLowerCase().includes(filtro) ||
        (u.email  || '').toLowerCase().includes(filtro) ||
        (u.rol    || '').toLowerCase().includes(filtro)
    );
    const inicio    = (pagina - 1) * POR_PAGINA;
    const slice     = lista.slice(inicio, inicio + POR_PAGINA);
    const total     = lista.length;
    const totalPags = Math.max(1, Math.ceil(total / POR_PAGINA));

    document.getElementById('infoReg').textContent = total === 0
        ? 'Sin registros'
        : `Mostrando ${inicio + 1}–${Math.min(inicio + POR_PAGINA, total)} de ${total}`;

    document.getElementById('tablaCuerpo').innerHTML = slice.length === 0
        ? `<tr><td colspan="5" class="text-center py-12 text-gray-400">Sin resultados</td></tr>`
        : slice.map(u => `
            <tr class="hover">
                <td class="text-xs text-gray-400">${u.id}</td>
                <td class="font-medium">${u.nombre || '—'}</td>
                <td class="text-sm text-gray-500">${u.email || '—'}</td>
                <td><span class="badge badge-sm ${rolBadge[u.rol] || 'badge-ghost'}">${u.rol || '—'}</span></td>
                <td class="text-right whitespace-nowrap">
                    <button class="btn btn-ghost btn-xs" onclick="abrirEditar(${u.id})">✏️</button>
                    <button class="btn btn-ghost btn-xs text-error" onclick="pedirBorrar(${u.id})">🗑️</button>
                </td>
            </tr>`).join('');

    document.getElementById('pgBotones').innerHTML = Array.from({ length: totalPags }, (_, i) => i + 1)
        .map(i => `<button class="join-item btn btn-xs ${i === pagina ? 'bg-[#1a6b3c] text-white border-none' : ''}" onclick="irPagina(${i})">${i}</button>`).join('');
}

function irPagina(n) { pagina = n; renderTabla(); }

function abrirCrear() {
    document.getElementById('modalTitulo').textContent = 'Crear Usuario';
    document.getElementById('itemId').value = '';
    ['fNombre','fEmail','fPassword'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fRol').value = 'PRODUCTOR';
    document.getElementById('bloquePassword').style.display = '';
    mForm?.show();
}

async function abrirEditar(id) {
    const u = await fetch(`/api/usuarios/${id}`).then(r => r.json());
    document.getElementById('modalTitulo').textContent = 'Editar Usuario';
    document.getElementById('itemId').value  = u.id;
    document.getElementById('fNombre').value = u.nombre || '';
    document.getElementById('fEmail').value  = u.email  || '';
    document.getElementById('fPassword').value = '';
    document.getElementById('fRol').value    = u.rol    || 'PRODUCTOR';
    document.getElementById('bloquePassword').style.display = 'none';
    mForm?.show();
}

async function guardar() {
    const id   = document.getElementById('itemId').value;
    const body = {
        nombre: document.getElementById('fNombre').value.trim(),
        email:  document.getElementById('fEmail').value.trim(),
        rol:    document.getElementById('fRol').value,
    };
    if (!id) {
        body.password = document.getElementById('fPassword').value;
    }
    if (!body.nombre || !body.email) { alert('Nombre y email son obligatorios.'); return; }
    const res = await fetch(id ? `/api/usuarios/${id}` : '/api/usuarios', {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (res.ok) { mForm?.hide(); await cargar(); }
    else         { alert('Error al guardar.'); }
}

function pedirBorrar(id) { borrandoId = id; mBorrar?.show(); }

async function borrar() {
    const res = await fetch(`/api/usuarios/${borrandoId}`, { method: 'DELETE' });
    if (res.ok || res.status === 204) { mBorrar?.hide(); await cargar(); }
}
</script>
</body>
</html>
