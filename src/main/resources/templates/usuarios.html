<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout('usuarios', 'EcoAdmin — Usuarios', 'Usuarios del sistema', ~{::#content}, ~{::#scripts})}">
<head><title>EcoAdmin — Usuarios</title></head>
<body>

<div id="content">
    <main class="flex-1 p-4 sm:p-6">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <div>
                <h2 class="text-xl font-bold text-gray-900">Usuarios</h2>
                <p class="text-sm text-gray-500 mt-0.5">Cuentas registradas en el sistema</p>
            </div>
            <button type="button" onclick="abrirCrear()" class="btn bg-[#1a6b3c] hover:bg-[#155c33] text-white border-none normal-case shrink-0">+ Nuevo Usuario</button>
        </div>
        <div class="mb-4">
            <div class="relative w-full sm:max-w-xs">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/></svg>
                <input type="text" id="busqueda" placeholder="Buscar usuarios..." oninput="filtrar()" class="input input-sm w-full pl-9 bg-white border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-x-auto">
            <table class="table table-zebra table-sm w-full">
                <thead>
                    <tr class="text-xs uppercase text-gray-400 border-b border-gray-100">
                        <th class="w-12">ID</th><th>Nombre</th><th>Email</th><th>Rol</th>
                        <th class="text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaCuerpo">
                    <tr><td colspan="5" class="text-center py-12 text-gray-400">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mt-4">
            <span class="text-xs text-gray-500" id="infoReg"></span>
            <div class="join" id="pgBotones"></div>
        </div>
    </main>

    <!-- MODAL FORM -->
    <div id="modalForm" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
        <div class="relative p-4 w-full max-w-md">
            <div class="relative bg-white rounded-2xl shadow-xl">
                <div class="flex items-center justify-between p-5 border-b border-gray-100">
                    <h3 id="modalTitulo" class="text-base font-semibold text-gray-900">Crear Usuario</h3>
                    <button type="button" data-modal-hide="modalForm" class="text-gray-400 hover:text-gray-700 rounded-lg p-1.5 hover:bg-gray-100"><svg class="w-4 h-4" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg></button>
                </div>
                <div class="p-5 space-y-4">
                    <input type="hidden" id="itemId">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label><input type="text" id="fNombre" class="input input-bordered input-sm w-full" placeholder="Nombre completo"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Email *</label><input type="email" id="fEmail" class="input input-bordered input-sm w-full" placeholder="usuario@empresa.com"></div>
                    <div id="bloquePassword"><label class="block text-sm font-medium text-gray-700 mb-1">Contrasena *</label><input type="password" id="fPassword" class="input input-bordered input-sm w-full" placeholder="Minimo 6 caracteres"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Rol</label>
                        <select id="fRol" class="select select-bordered select-sm w-full">
                            <option value="PRODUCTOR">PRODUCTOR</option>
                            <option value="GESTOR">GESTOR</option>
                            <option value="TRANSPORTISTA">TRANSPORTISTA</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                    </div>
                </div>
                <div class="flex items-center justify-end gap-3 p-5 border-t border-gray-100">
                    <button type="button" data-modal-hide="modalForm" class="btn btn-ghost btn-sm normal-case">Cancelar</button>
                    <button type="button" onclick="guardar()" class="btn btn-sm bg-[#1a6b3c] hover:bg-[#155c33] text-white border-none normal-case px-6">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL BORRAR -->
    <div id="modalBorrar" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
        <div class="relative p-4 w-full max-w-sm">
            <div class="relative bg-white rounded-2xl shadow-xl p-6 text-center">
                <button type="button" data-modal-hide="modalBorrar" class="absolute top-3 right-3 text-gray-400 hover:text-gray-700 rounded-lg p-1 hover:bg-gray-100"><svg class="w-4 h-4" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg></button>
                <div class="text-5xl mb-3">🗑️</div>
                <h6 class="text-base font-bold mb-1">Eliminar usuario?</h6>
                <p class="text-gray-500 text-sm mb-5">Esta accion no se puede deshacer.</p>
                <div class="flex justify-center gap-3">
                    <button type="button" data-modal-hide="modalBorrar" class="btn btn-sm btn-outline normal-case">Cancelar</button>
                    <button type="button" onclick="borrar()" class="btn btn-sm btn-error text-white normal-case">Eliminar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="scripts">
<script>
let todos = [], borrandoId, pagina = 1, filtro = '';
const POR_PAGINA = 15;
let mForm, mBorrar;

function initModales() {
    const elF = document.getElementById('modalForm');
    const elB = document.getElementById('modalBorrar');
    if (elF && typeof Modal !== 'undefined') {
        mForm   = new Modal(elF, { backdrop:'dynamic', closable:true });
        mBorrar = new Modal(elB, { backdrop:'dynamic', closable:true });
    }
}

document.addEventListener('DOMContentLoaded', () => { initModales(); cargar(); });
document.addEventListener('htmx:afterSwap',   () => { initModales(); if (document.getElementById('tablaCuerpo')) cargar(); });

async function cargar() {
    const res = await fetch('/api/usuarios');
    todos = await res.json();
    pagina = 1;
    renderTabla();
}

function filtrar() { filtro = document.getElementById('busqueda').value.toLowerCase(); pagina = 1; renderTabla(); }

const rolBadge = { ADMIN:'badge-error', GESTOR:'badge-warning', PRODUCTOR:'badge-info', TRANSPORTISTA:'badge-success' };

function renderTabla() {
    const lista = todos.filter(u =>
        (u.nombre || '').toLowerCase().includes(filtro) ||
        (u.email  || '').toLowerCase().includes(filtro) ||
        (u.rol    || '').toLowerCase().includes(filtro)
    );
    const inicio = (pagina - 1) * POR_PAGINA;
    const slice = lista.slice(inicio, inicio + POR_PAGINA);
    const total = lista.length;
    const totalPags = Math.max(1, Math.ceil(total / POR_PAGINA));
    document.getElementById('infoReg').textContent = total === 0 ? 'Sin registros' : `Mostrando ${inicio + 1}–${Math.min(inicio + POR_PAGINA, total)} de ${total}`;
    document.getElementById('tablaCuerpo').innerHTML = slice.length === 0
        ? `<tr><td colspan="5" class="text-center py-12 text-gray-400">Sin resultados</td></tr>`
        : slice.map(u => `<tr class="hover"><td class="text-xs text-gray-400">${u.id}</td><td class="font-medium">${u.nombre || '—'}</td><td class="text-sm text-gray-500">${u.email || '—'}</td><td><span class="badge badge-sm ${rolBadge[u.rol] || 'badge-ghost'}">${u.rol || '—'}</span></td><td class="text-right whitespace-nowrap"><button class="btn btn-ghost btn-xs" onclick="abrirEditar(${u.id})">✏️</button><button class="btn btn-ghost btn-xs text-error" onclick="pedirBorrar(${u.id})">🗑️</button></td></tr>`).join('');
    document.getElementById('pgBotones').innerHTML = Array.from({ length: totalPags }, (_, i) => i + 1)
        .map(i => `<button class="join-item btn btn-xs ${i === pagina ? 'bg-[#1a6b3c] text-white border-none' : ''}" onclick="irPagina(${i})">${i}</button>`).join('');
}

function irPagina(n) { pagina = n; renderTabla(); }

function abrirCrear() {
    document.getElementById('modalTitulo').textContent = 'Crear Usuario';
    document.getElementById('itemId').value = '';
    ['fNombre','fEmail','fPassword'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fRol').value = 'PRODUCTOR';
    document.getElementById('bloquePassword').style.display = '';
    mForm?.show();
}

async function abrirEditar(id) {
    const u = await fetch(`/api/usuarios/${id}`).then(r => r.json());
    document.getElementById('modalTitulo').textContent = 'Editar Usuario';
    document.getElementById('itemId').value = u.id;
    document.getElementById('fNombre').value = u.nombre || '';
    document.getElementById('fEmail').value = u.email || '';
    document.getElementById('fPassword').value = '';
    document.getElementById('fRol').value = u.rol || 'PRODUCTOR';
    document.getElementById('bloquePassword').style.display = 'none';
    mForm?.show();
}

async function guardar() {
    const id = document.getElementById('itemId').value;
    const body = {
        nombre: document.getElementById('fNombre').value.trim(),
        email:  document.getElementById('fEmail').value.trim(),
        rol:    document.getElementById('fRol').value,
    };
    if (!id) { body.password = document.getElementById('fPassword').value; }
    if (!body.nombre || !body.email) { alert('Nombre y email son obligatorios.'); return; }
    const res = await fetch(id ? `/api/usuarios/${id}` : '/api/usuarios', {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (res.ok) { mForm?.hide(); await cargar(); }
    else { alert('Error al guardar.'); }
}

function pedirBorrar(id) { borrandoId = id; mBorrar?.show(); }

async function borrar() {
    const res = await fetch(`/api/usuarios/${borrandoId}`, { method: 'DELETE' });
    if (res.ok || res.status === 204) { mBorrar?.hide(); await cargar(); }
}
</script>
</div>

</body>
</html>
