<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layouts/main :: layout('reports', 'EcoAdmin — Informes', 'Informes', ~{::pageContent}, ~{::pageScripts})}">
<body>

<th:block th:fragment="pageContent">
<main class="page-main">
    <div class="page-header">
        <div>
            <h1 class="page-title">Informes</h1>
            <p class="page-subtitle">Construye un informe filtrado y expórtalo a CSV.</p>
        </div>
        <div class="page-actions"></div>
    </div>

    <!-- Selector de tipo de informe -->
    <div class="card p-5 mb-5">
        <div class="flex flex-wrap gap-2 mb-5">
            <button type="button" data-tipo="traslados" onclick="seleccionarTipo('traslados')"
                    class="tipo-btn px-4 py-2 rounded-xl text-sm font-semibold border transition-all bg-[#3b82f6] text-white border-[#3b82f6] shadow-sm">
                <span class="inline-flex items-center gap-1.5"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>Traslados</span>
            </button>
            <button type="button" data-tipo="residuos" onclick="seleccionarTipo('residuos')"
                    class="tipo-btn px-4 py-2 rounded-xl text-sm font-semibold border transition-all bg-white text-slate-600 border-slate-200 hover:border-[#3b82f6] hover:text-[#3b82f6]">
                Residuos
            </button>
            <button type="button" data-tipo="centros" onclick="seleccionarTipo('centros')"
                    class="tipo-btn px-4 py-2 rounded-xl text-sm font-semibold border transition-all bg-white text-slate-600 border-slate-200 hover:border-[#3b82f6] hover:text-[#3b82f6]">
                Centros
            </button>
            <button type="button" data-tipo="documentos" onclick="seleccionarTipo('documentos')"
                    class="tipo-btn px-4 py-2 rounded-xl text-sm font-semibold border transition-all bg-white text-slate-600 border-slate-200 hover:border-[#3b82f6] hover:text-[#3b82f6]">
                Documentos
            </button>
            <button type="button" data-tipo="almacen" onclick="seleccionarTipo('almacen')"
                    class="tipo-btn px-4 py-2 rounded-xl text-sm font-semibold border transition-all bg-white text-slate-600 border-slate-200 hover:border-[#3b82f6] hover:text-[#3b82f6]">
                <span class="inline-flex items-center gap-1.5"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg>Inventario almacén</span>
            </button>
            <button type="button" data-tipo="final-gestion" onclick="seleccionarTipo('final-gestion')"
                    class="tipo-btn px-4 py-2 rounded-xl text-sm font-semibold border transition-all bg-white text-slate-600 border-slate-200 hover:border-emerald-500 hover:text-emerald-600">
                <span class="inline-flex items-center gap-1.5"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Final gestión</span>
            </button>
            <button type="button" data-tipo="checklist-auditoria" onclick="seleccionarTipo('checklist-auditoria')"
                    class="tipo-btn px-4 py-2 rounded-xl text-sm font-semibold border transition-all bg-white text-slate-600 border-slate-200 hover:border-amber-500 hover:text-amber-600">
                <span class="inline-flex items-center gap-1.5"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Checklist auditoría</span>
            </button>
        </div>

        <!-- Filtros dinámicos -->
        <div id="filtrosContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3"></div>

        <div class="flex flex-wrap gap-2 mt-5">
            <button type="button" onclick="ejecutar()" class="btn-primary inline-flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                Generar informe
            </button>
            <button type="button" onclick="descargarCsv()" class="btn-secondary inline-flex items-center gap-2">
                <svg class="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                Descargar CSV
            </button>
            <button type="button" id="btnDescargarPdf" onclick="descargarPdf()" class="btn-secondary inline-flex items-center gap-2" style="display:none">
                <svg class="w-4 h-4 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                Descargar PDF
            </button>
            <button type="button" onclick="limpiarFiltros()" class="btn-ghost-eco">
                Limpiar
            </button>
        </div>
    </div>

    <!-- Resultado -->
    <div class="card overflow-hidden">
        <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100">
            <div>
                <h2 class="text-base font-bold text-slate-800">Resultado</h2>
                <p id="resumenInforme" class="text-xs text-slate-500 mt-0.5">Sin generar.</p>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead id="tablaCabeza" class="bg-slate-50/60">
                    <tr><th class="text-left px-4 py-3 text-[11px] uppercase text-slate-400 tracking-wide">Pulsa "Generar informe" para ver los datos</th></tr>
                </thead>
                <tbody id="tablaCuerpo" class="divide-y divide-slate-50">
                    <tr><td class="text-center py-10 text-slate-400 text-xs">Sin datos.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</th:block>

<th:block th:fragment="pageScripts">
<script>
var tipoActual = 'traslados';
var centrosCache = [];
var metaCache = null;

// Definición de filtros por tipo. Cada filtro = { name, label, type, options? }.
var FILTROS = {
    traslados: [
        { name: 'desde',     label: 'Desde',         type: 'date' },
        { name: 'hasta',     label: 'Hasta',         type: 'date' },
        { name: 'estado',    label: 'Estado',        type: 'enum-traslado' },
        { name: 'centroId',  label: 'Centro',        type: 'centro' },
        { name: 'codigoLER', label: 'Código LER',    type: 'text', placeholder: 'Ej: 200301' }
    ],
    residuos: [
        { name: 'centroId',  label: 'Centro',        type: 'centro' },
        { name: 'codigoLER', label: 'Código LER',    type: 'text', placeholder: 'Ej: 200301' },
        { name: 'estado',    label: 'Estado',        type: 'text', placeholder: 'Ej: ALMACENADO' }
    ],
    centros: [
        { name: 'centroId',  label: 'Centro',        type: 'centro' },
        { name: 'estado',    label: 'Tipo',          type: 'text', placeholder: 'PRODUCTOR / GESTOR' }
    ],
    documentos: [
        { name: 'desde',         label: 'Desde (emisión)', type: 'date' },
        { name: 'hasta',         label: 'Hasta (emisión)', type: 'date' },
        { name: 'tipoDocumento', label: 'Tipo documento',  type: 'enum-doc' },
        { name: 'estado',        label: 'Estado',          type: 'text', placeholder: 'BORRADOR/EMITIDO/...' },
        { name: 'centroId',      label: 'Centro',          type: 'centro' }
    ],
    almacen: [
        { name: 'centroId',  label: 'Centro',     type: 'centro' },
        { name: 'codigoLER', label: 'Código LER', type: 'text', placeholder: 'Ej: 200301' }
    ],
    'final-gestion': [
        { name: 'desde', label: 'Desde', type: 'date' },
        { name: 'hasta', label: 'Hasta', type: 'date' }
    ],
    'checklist-auditoria': [
        { name: 'desde', label: 'Desde', type: 'date' },
        { name: 'hasta', label: 'Hasta', type: 'date' }
    ]
};

async function init() {
    try {
        var [centros, meta] = await Promise.all([
            fetch('/api/centros').then(r => r.ok ? r.json() : []),
            fetch('/api/informes/meta').then(r => r.ok ? r.json() : null)
        ]);
        centrosCache = Array.isArray(centros) ? centros : [];
        metaCache = meta || { estadosTraslado: [], tiposDocumento: [] };
    } catch (e) {
        console.error('Error cargando metadata', e);
    }
    renderFiltros();
}

function seleccionarTipo(tipo) {
    tipoActual = tipo;
    document.querySelectorAll('.tipo-btn').forEach(function(btn) {
        var activo = btn.getAttribute('data-tipo') === tipo;
        btn.className = 'tipo-btn px-4 py-2 rounded-xl text-sm font-semibold border transition-all '
            + (activo
                ? 'bg-[#3b82f6] text-white border-[#3b82f6] shadow-sm'
                : 'bg-white text-slate-600 border-slate-200 hover:border-[#3b82f6] hover:text-[#3b82f6]');
    });
    renderFiltros();
    document.getElementById('btnDescargarPdf').style.display = (tipo === 'final-gestion') ? '' : 'none';
    document.getElementById('tablaCabeza').innerHTML = '<tr><th class="text-left px-4 py-3 text-[11px] uppercase text-slate-400 tracking-wide">Pulsa "Generar informe" para ver los datos</th></tr>';
    document.getElementById('tablaCuerpo').innerHTML = '<tr><td class="text-center py-10 text-slate-400 text-xs">Sin datos.</td></tr>';
    document.getElementById('resumenInforme').textContent = 'Sin generar.';
}

function renderFiltros() {
    var cont = document.getElementById('filtrosContainer');
    var filtros = FILTROS[tipoActual] || [];
    cont.innerHTML = filtros.map(function(f) {
        var input = '';
        if (f.type === 'date') {
            input = '<input type="date" id="filtro_' + f.name + '" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:border-[#3b82f6] focus:outline-none">';
        } else if (f.type === 'text') {
            input = '<input type="text" id="filtro_' + f.name + '" placeholder="' + (f.placeholder || '') + '" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:border-[#3b82f6] focus:outline-none">';
        } else if (f.type === 'centro') {
            var opts = '<option value="">Todos</option>' + centrosCache.map(function(c) {
                return '<option value="' + c.id + '">' + esc(c.nombre || ('#' + c.id)) + '</option>';
            }).join('');
            input = '<select id="filtro_' + f.name + '" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:border-[#3b82f6] focus:outline-none">' + opts + '</select>';
        } else if (f.type === 'enum-traslado') {
            var es = (metaCache && metaCache.estadosTraslado) || [];
            input = '<select id="filtro_' + f.name + '" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:border-[#3b82f6] focus:outline-none">'
                + '<option value="">Todos</option>'
                + es.map(function(e) { return '<option value="' + e + '">' + e + '</option>'; }).join('')
                + '</select>';
        } else if (f.type === 'enum-doc') {
            var td = (metaCache && metaCache.tiposDocumento) || [];
            input = '<select id="filtro_' + f.name + '" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:border-[#3b82f6] focus:outline-none">'
                + '<option value="">Todos</option>'
                + td.map(function(e) { return '<option value="' + e + '">' + e + '</option>'; }).join('')
                + '</select>';
        }
        return '<div>'
            + '<label class="block text-xs font-medium text-slate-600 mb-1">' + esc(f.label) + '</label>'
            + input
            + '</div>';
    }).join('');
}

function recogerFiltros() {
    var filtros = FILTROS[tipoActual] || [];
    var params = new URLSearchParams();
    filtros.forEach(function(f) {
        var el = document.getElementById('filtro_' + f.name);
        if (!el) return;
        var v = (el.value || '').trim();
        if (v) params.append(f.name, v);
    });
    return params;
}

function limpiarFiltros() {
    var filtros = FILTROS[tipoActual] || [];
    filtros.forEach(function(f) {
        var el = document.getElementById('filtro_' + f.name);
        if (el) el.value = '';
    });
}

async function ejecutar() {
    var resumen = document.getElementById('resumenInforme');
    var head = document.getElementById('tablaCabeza');
    var body = document.getElementById('tablaCuerpo');
    resumen.textContent = 'Cargando...';
    head.innerHTML = '';
    body.innerHTML = '<tr><td class="text-center py-10 text-slate-400 text-xs">Cargando...</td></tr>';

    var qs = recogerFiltros().toString();

    // Tipos con endpoints propios
    if (tipoActual === 'final-gestion') {
        await ejecutarFinalGestion(qs, resumen, head, body);
        return;
    }
    if (tipoActual === 'checklist-auditoria') {
        await ejecutarChecklistAuditoria(qs, resumen, head, body);
        return;
    }
    if (tipoActual === 'almacen') {
        var url2 = '/api/informes/inventario-almacen' + (qs ? '?' + qs : '');
        try {
            var r2 = await fetch(url2);
            var data2 = await r2.json();
            var cols2 = data2.columns || [];
            var rows2 = data2.rows || [];
            renderTabla(cols2, rows2, head, body);
            var sum = data2.resumen || {};
            resumen.textContent = (data2.total || rows2.length) + ' residuos en almacén'
                + (sum.criticos ? ' · ' + sum.criticos + ' CRÍTICOS' : '')
                + (sum.avisos ? ' · ' + sum.avisos + ' AVISOS' : '');
        } catch (e) {
            body.innerHTML = '<tr><td class="text-center py-10 text-red-500 text-xs">Error: ' + esc(e.message) + '</td></tr>';
            resumen.textContent = 'Error al generar informe.';
        }
        return;
    }

    var url = '/api/informes/' + tipoActual + (qs ? '?' + qs : '');
    try {
        var r = await fetch(url);
        if (!r.ok) {
            var err = await r.text();
            throw new Error('HTTP ' + r.status + ': ' + err);
        }
        var data = await r.json();
        var cols = data.columns || [];
        var rows = data.rows || [];
        renderTabla(cols, rows, head, body);
        resumen.textContent = (data.total || rows.length) + ' resultado(s) — ' + capitalizar(tipoActual);
    } catch (e) {
        console.error(e);
        body.innerHTML = '<tr><td class="text-center py-10 text-red-500 text-xs">Error: ' + esc(e.message) + '</td></tr>';
        resumen.textContent = 'Error al generar informe.';
    }
}

async function ejecutarFinalGestion(qs, resumen, head, body) {
    try {
        var r = await fetch('/api/informes/final-gestion' + (qs ? '?' + qs : ''));
        var data = await r.json();
        var cols = ['Código LER', 'Descripción', 'Cantidad total', 'Unidad', 'Traslados completados', 'Gestores únicos'];
        var rows = (data.porLer || []).map(function(f) {
            return [f.codigoLER, f.descripcion, f.cantidadTotal, f.unidad, f.trasladosCompletados, f.gestoresUnicos];
        });
        renderTabla(cols, rows, head, body);
        var sum = data.resumen || {};
        resumen.textContent = 'Informe Final de Gestión · ' + sum.trasladosCompletados + ' traslados, '
            + sum.recogidasCompletadas + ' recogidas, ' + sum.codigosLerDistintos + ' LERs distintos';
    } catch (e) {
        body.innerHTML = '<tr><td class="text-center py-10 text-red-500 text-xs">Error: ' + esc(e.message) + '</td></tr>';
        resumen.textContent = 'Error al generar informe.';
    }
}

async function ejecutarChecklistAuditoria(qs, resumen, head, body) {
    var SEMAFORO = { VERDE: '🟢', AMARILLO: '🟡', ROJO: '🔴' };
    try {
        var r = await fetch('/api/informes/checklist-auditoria' + (qs ? '?' + qs : ''));
        var data = await r.json();
        var cols = ['Semáforo', 'Traslado', 'Estado', 'Centro productor', 'Fecha', 'DI cerrado', 'NP vigente', 'Contrato activo'];
        var rows = (data.items || []).map(function(i) {
            return [
                SEMAFORO[i.semaforo] || i.semaforo,
                i.traslado, i.estado, i.centroProductor, i.fechaCreacion,
                i.tieneDocumento ? 'Sí' : 'No',
                i.tieneNP ? 'Sí' : 'No',
                i.tieneContrato ? 'Sí' : 'No'
            ];
        });
        renderTabla(cols, rows, head, body);
        var sum = data.resumen || {};
        resumen.textContent = 'Checklist · 🟢 ' + sum.verdes + ' OK · 🟡 ' + sum.amarillos + ' Aviso · 🔴 ' + sum.rojos + ' Crítico';
    } catch (e) {
        body.innerHTML = '<tr><td class="text-center py-10 text-red-500 text-xs">Error: ' + esc(e.message) + '</td></tr>';
        resumen.textContent = 'Error al generar informe.';
    }
}

function renderTabla(cols, rows, head, body) {
    head.innerHTML = '<tr>' + cols.map(function(c) {
        return '<th class="text-left px-4 py-3 text-[11px] uppercase text-slate-400 tracking-wide font-semibold whitespace-nowrap">' + esc(String(c)) + '</th>';
    }).join('') + '</tr>';
    if (rows.length === 0) {
        body.innerHTML = '<tr><td colspan="' + Math.max(cols.length, 1) + '" class="text-center py-10 text-slate-400 text-xs">Sin resultados con esos filtros.</td></tr>';
    } else {
        var limite = 200;
        var visibles = rows.slice(0, limite);
        body.innerHTML = visibles.map(function(row) {
            return '<tr class="hover:bg-slate-50/70 transition-colors">'
                + row.map(function(v) {
                    return '<td class="px-4 py-2.5 text-slate-700 text-sm whitespace-nowrap">' + esc(String(v == null ? '' : v)) + '</td>';
                }).join('')
                + '</tr>';
        }).join('');
        if (rows.length > limite) {
            body.innerHTML += '<tr><td colspan="' + cols.length + '" class="text-center py-3 text-xs text-amber-600 bg-amber-50/40">Mostrando ' + limite + ' de ' + rows.length + ' filas. Descarga el CSV para verlas todas.</td></tr>';
        }
    }
}

function descargarCsv() {
    var qs = recogerFiltros().toString();
    var url = '/api/informes/' + tipoActual + '/csv' + (qs ? '?' + qs : '');
    // window.location preserva la sesión (cookies) y dispara descarga directa
    window.location.href = url;
}

function descargarPdf() {
    var qs = recogerFiltros().toString();
    window.location.href = '/api/informes/final-gestion/pdf' + (qs ? '?' + qs : '');
}

function capitalizar(s) {
    return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
}

document.addEventListener('DOMContentLoaded', init);
</script>
</th:block>
</body>
</html>
