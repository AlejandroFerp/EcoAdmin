<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layouts/main :: layout('users', 'EcoAdmin — Usuarios', 'Usuarios del sistema', ~{::pageContent}, ~{::pageScripts})}">
<body>

<th:block th:fragment="pageContent">
<main class="page-main">
    <div class="page-header">
        <div>
            <h2 class="page-title">Usuarios</h2>
            <p class="page-subtitle">Cuentas registradas en el sistema</p>
        </div>
        <div class="page-actions">
            <button type="button" onclick="abrirCrear()" class="btn-primary shrink-0">
                + Nuevo Usuario
            </button>
        </div>
    </div>
    <div th:replace="~{layouts/fragments :: searchBar('Buscar usuarios...')}"></div>
    <div class="card overflow-x-auto">
        <table class="table table-zebra table-sm w-full">
            <thead>
                <tr class="text-xs uppercase text-slate-400 border-b border-slate-100">
                    <th class="w-10 pr-0"><input type="checkbox" class="checkbox checkbox-xs" id="selAll" onclick="seleccionarTodos(this)"></th>
                    <th class="w-12">ID</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th class="text-right">Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo">
                <tr><td colspan="6" class="text-center py-12 text-slate-400">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
    <div th:replace="~{layouts/fragments :: paginationBar}"></div>
</main>

<!-- MODAL FORM -->
<div th:replace="~{layouts/fragments :: crudModal('modalForm', 'sm', 'Crear Usuario', 'guardar', ~{::modalBody})}">
    <th:block th:fragment="modalBody">
        <input type="hidden" id="itemId">
                <div>
                    <label class="label-eco">Nombre *</label>
                    <input type="text" id="fNombre" class="form-control-eco" placeholder="Nombre completo">
                </div>
                <div>
                    <label class="label-eco">Email *</label>
                    <input type="email" id="fEmail" class="form-control-eco" placeholder="usuario@empresa.com">
                </div>
                <div id="bloquePassword">
                    <label class="label-eco">Contrasena *</label>
                    <input type="password" id="fPassword" class="form-control-eco" placeholder="Minimo 6 caracteres">
                </div>
                <div>
                    <label class="label-eco">Rol</label>
                    <select id="fRol" class="form-control-eco">
                        <option value="PRODUCTOR">PRODUCTOR</option>
                        <option value="GESTOR">GESTOR</option>
                        <option value="TRANSPORTISTA">TRANSPORTISTA</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
    </th:block>
</div>
</th:block>

<th:block th:fragment="pageScripts">
<script>
var todos = [], pagina = 1, filtro = '';
var POR_PAGINA = 15;
var mForm;

function initModales() {
    mForm = {
        show: function() { document.getElementById('modalForm').classList.remove('hidden'); },
        hide: function() { document.getElementById('modalForm').classList.add('hidden'); }
    };
}

document.addEventListener('DOMContentLoaded', function() { initModales(); cargar(); });

// rolBadge proviene de window.rolBadge (definido en layouts/main.html)

async function cargar() {
    try {
        var res = await fetch('/api/usuarios');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        todos = await res.json();
    } catch (err) {
        document.getElementById('tablaCuerpo').innerHTML =
            '<tr><td colspan="6" class="text-center py-12 text-red-400">Error al cargar datos. Recarga la p\u00e1gina.</td></tr>';
        return;
    }
    pagina = 1;
    renderTabla();
}

function filtrar() { filtro = document.getElementById('busqueda').value.toLowerCase(); pagina = 1; renderTabla(); }

function renderTabla() {
    var lista = todos.filter(function(u) {
        return (u.nombre || '').toLowerCase().includes(filtro) ||
               (u.email || '').toLowerCase().includes(filtro) ||
               (u.rol || '').toLowerCase().includes(filtro);
    });
    var inicio = (pagina - 1) * POR_PAGINA;
    var slice = lista.slice(inicio, inicio + POR_PAGINA);
    var total = lista.length;
    var totalPags = Math.max(1, Math.ceil(total / POR_PAGINA));

    document.getElementById('infoReg').textContent = total === 0
        ? 'Sin registros'
        : 'Mostrando ' + (inicio + 1) + '\u2013' + Math.min(inicio + POR_PAGINA, total) + ' de ' + total;

    document.getElementById('tablaCuerpo').innerHTML = slice.length === 0
        ? '<tr><td colspan="5" class="text-center py-12 text-slate-400">Sin resultados</td></tr>'
        : slice.map(function(u) {
            return '<tr class="hover" ondblclick="abrirEditar(' + u.id + ')">'
                + '<td class="w-10 pr-0"><input type="checkbox" class="checkbox checkbox-xs batch-check" value="' + u.id + '" onchange="actualizarBatchBar()" onclick="event.stopPropagation()"></td>'
                + '<td class="text-xs font-mono text-slate-500 whitespace-nowrap">' + (u.codigo || ('#' + u.id)) + '</td>'
                + '<td class="font-medium">' + esc(u.nombre || '\u2014') + '</td>'
                + '<td class="text-sm text-slate-500">' + esc(u.email || '\u2014') + '</td>'
                + '<td>' + (window.rolBadge ? window.rolBadge(u.rol) : esc(u.rol || '—')) + '</td>'
                + '<td class="text-right whitespace-nowrap">'
                + (u.rol === 'TRANSPORTISTA' ? '  <a href="/usuarios/' + u.id + '" class="btn-icon" title="Ver perfil transportista"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></a>' : '')
                + '  <button class="btn-icon" title="Editar" onclick="abrirEditar(' + u.id + ')"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>'
                + '  <button class="btn-icon btn-icon--danger" title="Eliminar" onclick="pedirBorrar(' + u.id + ')"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg></button>'
                + '</td></tr>';
        }).join('');

    document.getElementById('pgBotones').innerHTML = totalPags <= 1 ? '' : Array.from({ length: totalPags }, function(_, i) { return i + 1; })
        .map(function(i) { return '<button class="join-item btn btn-xs ' + (i === pagina ? 'bg-[#3b82f6] text-white border-none' : '') + '" onclick="irPagina(' + i + ')">' + i + '</button>'; }).join('');
}

function irPagina(n) { pagina = n; renderTabla(); }

function abrirCrear() {
    document.getElementById('modalFormTitulo').textContent = 'Crear Usuario';
    document.getElementById('itemId').value = '';
    ['fNombre','fEmail','fPassword'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('fRol').value = 'PRODUCTOR';
    document.getElementById('bloquePassword').style.display = '';
    if (window.refreshChoices) window.refreshChoices(document.getElementById('fRol'));
    mForm && mForm.show();
}

async function abrirEditar(id) {
    var u = await fetch('/api/usuarios/' + id).then(function(r) { return r.json(); });
    document.getElementById('modalFormTitulo').textContent = 'Editar Usuario';
    document.getElementById('itemId').value = u.id;
    document.getElementById('fNombre').value = u.nombre || '';
    document.getElementById('fEmail').value = u.email || '';
    document.getElementById('fPassword').value = '';
    document.getElementById('fRol').value = u.rol || 'PRODUCTOR';
    document.getElementById('bloquePassword').style.display = 'none';
    if (window.refreshChoices) window.refreshChoices(document.getElementById('fRol'));
    mForm && mForm.show();
}

async function guardar() {
    var id = document.getElementById('itemId').value;
    var body = {
        nombre: document.getElementById('fNombre').value.trim(),
        email: document.getElementById('fEmail').value.trim(),
        rol: document.getElementById('fRol').value
    };
    if (!id) body.password = document.getElementById('fPassword').value;
    if (!body.nombre || !body.email) { Swal.fire({ icon:'warning', text:'Nombre y email son obligatorios.' }); return; }
    var res = await fetch(id ? '/api/usuarios/' + id : '/api/usuarios', {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (res.ok) { mForm && mForm.hide(); await cargar(); }
    else { Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo guardar el usuario.' }); }
}

async function pedirBorrar(id) {
    var result = await Swal.fire({
        title: 'Eliminar usuario?',
        text: 'Esta accion no se puede deshacer.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonText: 'Cancelar',
        confirmButtonText: 'Eliminar'
    });
    if (!result.isConfirmed) return;
    var res = await fetch('/api/usuarios/' + id, { method: 'DELETE' });
    if (res.ok || res.status === 204) { await cargar(); }
    else {
        var data = await res.json().catch(function() { return {}; });
        Swal.fire({ icon: 'error', title: 'No se puede eliminar', text: data.error || 'Error al eliminar.' });
    }
}
async function borrarSeleccionados() {
    var ids = getSeleccionados();
    if (!ids.length) return;
    var result = await Swal.fire({
        title: 'Eliminar ' + ids.length + ' usuario(s)?',
        text: 'Esta acción no se puede deshacer.',
        icon: 'warning', showCancelButton: true,
        confirmButtonColor: '#ef4444', cancelButtonText: 'Cancelar', confirmButtonText: 'Eliminar'
    });
    if (!result.isConfirmed) return;
    var errors = [];
    for (var id of ids) {
        var res = await fetch('/api/usuarios/' + id, { method: 'DELETE' });
        if (!res.ok && res.status !== 204) {
            var d = await res.json().catch(function(){ return {}; });
            errors.push((d.error || 'Error') + ' (ID ' + id + ')');
        }
    }
    limpiarSeleccion();
    await cargar();
    if (errors.length) Swal.fire({ icon: 'warning', title: 'Algunos no se pudieron eliminar', text: errors.join('\n') });
}
</script>
</th:block>
</body>
</html>
