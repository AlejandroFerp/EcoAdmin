<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layouts/main :: layout('shipments', 'EcoAdmin — Error QR', 'Error de entrada', ~{::pageContent}, ~{::pageScripts})}">

<body>
    <th:block th:fragment="pageContent">
        <main class="page-main flex items-center justify-center min-h-[70vh]">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 max-w-md w-full p-8 text-center">

                <!-- Icono error -->
                <div class="flex justify-center mb-5">
                    <span class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-50">
                        <svg class="w-9 h-9 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 9v3m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
                        </svg>
                    </span>
                </div>

                <h1 class="text-xl font-semibold text-slate-800 mb-3">No se pudo registrar la entrada</h1>

                <p class="text-sm text-slate-600 bg-red-50 border border-red-100 rounded-xl px-4 py-3 mb-6"
                   th:text="${error}">Error desconocido.</p>

                <div class="flex flex-col gap-2">
                    <a href="/qr/scanner"
                       class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl bg-[#3b82f6] text-white text-sm font-medium hover:bg-blue-600 transition-colors">
                        Volver al escáner
                    </a>
                    <a href="/shipments"
                       class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl border border-slate-200 text-slate-600 text-sm hover:bg-slate-50 transition-colors">
                        Ir a Recogidas
                    </a>
                </div>
            </div>
        </main>
    </th:block>

    <th:block th:fragment="pageScripts"></th:block>
</body>
</html>
