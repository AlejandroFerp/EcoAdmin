<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EcoAdmin — Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>*{font-family:'Inter',sans-serif;}</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#1a6b3c] to-[#2d9e5f] flex items-center justify-center p-4">

<div class="w-full max-w-sm">
    <!-- Logo card -->
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 text-4xl">🌿</div>
        <h1 class="text-3xl font-bold text-white">EcoAdmin</h1>
        <p class="text-white/70 text-sm mt-1">Gestión de residuos peligrosos</p>
    </div>

    <!-- Login card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
        <h2 class="text-xl font-bold text-gray-900 mb-6">Iniciar sesión</h2>

        <div th:if="${param.error}" class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
            Email o contraseña incorrectos.
        </div>
        <div th:if="${param.logout}" class="mb-4 p-3 rounded-lg bg-green-50 border border-green-200 text-green-700 text-sm">
            Sesión cerrada correctamente.
        </div>

        <form th:action="@{/public/login}" method="post" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-1.5">Email</label>
                <input type="email" id="username" name="username"
                       class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                       placeholder="usuario@empresa.com" required autofocus>
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">Contraseña</label>
                <input type="password" id="password" name="password"
                       class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                       placeholder="••••••••" required>
            </div>
            <button type="submit"
                    class="w-full py-2.5 rounded-xl bg-[#1a6b3c] hover:bg-[#155c33] text-white font-semibold text-sm transition-colors">
                Acceder
            </button>
        </form>
    </div>
</div>

</body>
</html>
