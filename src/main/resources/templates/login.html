<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EcoAdmin — Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background:
                radial-gradient(ellipse at top left, rgba(255,255,255,0.10), transparent 55%),
                radial-gradient(ellipse at bottom right, rgba(0,0,0,0.18), transparent 55%),
                linear-gradient(135deg, #145a32 0%, #1a6b3c 45%, #2d9e5f 100%);
            min-height: 100vh;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px) saturate(140%);
            -webkit-backdrop-filter: blur(16px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .input-group { position: relative; }
        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 42px;
            background: transparent;
            border: none;
            border-bottom: 2px solid #c8d6cf;
            color: #1f3b2c;
            font-size: 0.95rem;
            transition: border-color .2s;
            outline: none;
        }
        .input-group input:focus { border-bottom-color: #1a6b3c; }
        .input-group input::placeholder { color: transparent; }
        .input-group label {
            position: absolute;
            left: 42px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7d72;
            font-size: 0.9rem;
            font-weight: 500;
            pointer-events: none;
            transition: all .15s ease-out;
        }
        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: -2px;
            left: 38px;
            font-size: 0.7rem;
            color: #1a6b3c;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .input-group .input-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #1a6b3c;
            opacity: 0.85;
            pointer-events: none;
        }
        .btn-login {
            background: #1a6b3c;
            color: white;
            font-weight: 600;
            padding: 12px 22px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
            cursor: pointer;
            transition: background .2s, transform .1s, box-shadow .2s;
            box-shadow: 0 6px 20px -6px rgba(26,107,60,0.55);
        }
        .btn-login:hover { background: #155c33; box-shadow: 0 10px 28px -6px rgba(21,92,51,0.65); }
        .btn-login:active { transform: translateY(1px); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

<div class="w-full max-w-sm">
    <div class="login-card rounded-2xl shadow-2xl px-7 py-9 text-center">
        <div class="mx-auto w-24 h-24 rounded-full bg-white shadow-sm flex items-center justify-center mb-3 overflow-hidden">
            <img th:src="@{/logo.png}" src="/logo.png" alt="EcoAdmin" class="w-20 h-20 object-contain">
        </div>
        <p class="text-sm text-slate-500 mb-1">Bienvenido a</p>
        <h1 class="text-2xl font-bold text-[#1a6b3c] tracking-tight mb-1">EcoAdmin</h1>
        <p class="text-xs text-slate-500 mb-6">Inicia sesión con tu cuenta</p>

        <div th:if="${param.error}" class="mb-4 px-3 py-2 rounded-lg bg-red-50 border border-red-200 text-red-700 text-xs text-left">
            Email o contraseña incorrectos.
        </div>
        <div th:if="${param.logout}" class="mb-4 px-3 py-2 rounded-lg bg-green-50 border border-green-200 text-green-700 text-xs text-left">
            Sesión cerrada correctamente.
        </div>
        <div th:if="${param.registro}" class="mb-4 px-3 py-2 rounded-lg bg-green-50 border border-green-200 text-green-700 text-xs text-left">
            Solicitud enviada correctamente. Inicia sesión cuando tu cuenta haya sido aprobada.
        </div>

        <form th:action="@{/login}" method="post" class="space-y-6 text-left">
            <div class="input-group">
                <span class="input-icon">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </span>
                <input type="email" id="username" name="username" placeholder=" " required autofocus autocomplete="username">
                <label for="username">Email</label>
            </div>

            <div class="input-group">
                <span class="input-icon">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 11c1.105 0 2-.895 2-2V7a2 2 0 10-4 0v2c0 1.105.895 2 2 2zm6 2v6a2 2 0 01-2 2H8a2 2 0 01-2-2v-6a2 2 0 012-2h8a2 2 0 012 2z"/>
                    </svg>
                </span>
                <input type="password" id="password" name="password" placeholder=" " required autocomplete="current-password">
                <label for="password">Contraseña</label>
            </div>

            <div class="flex justify-center pt-2">
                <button type="submit" class="btn-login">Ingresar</button>
            </div>
        </form>

        <div class="mt-6 mb-3 h-px bg-slate-200/80"></div>
        <a th:href="@{/registro}" class="text-sm text-[#1a6b3c] font-semibold hover:underline">Registrarse</a>
        <p class="text-xs text-slate-400 mt-2">EcoAdmin &middot; Gesti&oacute;n de residuos peligrosos</p>
    </div>
</div>

</body>
</html>
