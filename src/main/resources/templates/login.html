<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EcoAdmin — Acceso</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a6b3c 0%, #2d9e5f 100%);
            min-height: 100vh;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        .login-logo {
            width: 64px;
            height: 64px;
            background: #1a6b3c;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
        }
        .form-control:focus {
            border-color: #2d9e5f;
            box-shadow: 0 0 0 0.2rem rgba(45,158,95,.2);
        }
        .btn-acceder {
            background: #1a6b3c;
            border: none;
            padding: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.4px;
            transition: background 0.2s;
        }
        .btn-acceder:hover {
            background: #155930;
        }
    </style>
</head>
<body>

<div class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="login-card card p-4" style="width: 400px;">

        <div class="text-center mb-4">
            <div class="login-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 16 16">
                    <path d="M11 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0-.5.5v4H1.5a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.5-.5H11V.5zm-1 0V4H6V.5h4zM2 5.5h12v6H2v-6z"/>
                </svg>
            </div>
            <h4 class="fw-bold mb-1">EcoAdmin</h4>
            <p class="text-muted small mb-0">Gestión de residuos peligrosos</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger py-2 small mb-3" role="alert">
            <strong>Acceso denegado.</strong> Comprueba tu email o contraseña.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small mb-3" role="alert">
            Sesión cerrada correctamente.
        </div>

        <form th:action="@{/public/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold small">Email</label>
                <input type="email" id="username" name="username"
                       class="form-control form-control-lg"
                       placeholder="usuario@ejemplo.com" required autofocus>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold small">Contraseña</label>
                <input type="password" id="password" name="password"
                       class="form-control form-control-lg"
                       placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-acceder btn-lg w-100 text-white">
                Acceder
            </button>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
