<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('residuos', 'EcoAdmin — Residuos', 'Residuos peligrosos', ~{::pageContent}, ~{::pageScripts})}">
<body>

<th:block th:fragment="pageContent">
<main class="flex-1 p-4 sm:p-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h2 class="text-xl font-bold text-slate-900">Residuos</h2>
            <p class="text-sm text-slate-500 mt-0.5">Catalogo de residuos peligrosos</p>
        </div>
        <button type="button" onclick="abrirCrear()"
                class="btn bg-[#3b82f6] hover:bg-[#2563eb] text-white border-none normal-case shrink-0 shadow-md">
            + Anadir Residuo
        </button>
    </div>
    <div th:replace="~{layouts/fragments :: searchBar('Buscar residuos...')}"></div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-x-auto">
        <table class="table table-zebra table-sm w-full">
            <thead>
                <tr class="text-xs uppercase text-slate-400 border-b border-slate-100">
                    <th class="w-10 pr-0"><input type="checkbox" class="checkbox checkbox-xs" id="selAll" onclick="seleccionarTodos(this)"></th>
                    <th class="w-12">ID</th>
                    <th>Codigo LER</th>
                    <th>Descripcion</th>
                    <th>Cantidad</th>
                    <th>Unidad</th>
                    <th>Estado</th>
                    <th class="hidden md:table-cell">Días alm.</th>
                    <th class="hidden lg:table-cell">Centro</th>
                    <th class="text-right">Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo">
                <tr><td colspan="9" class="text-center py-12 text-slate-400">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
    <div th:replace="~{layouts/fragments :: paginationBar}"></div>
</main>

<!-- MODAL FORM -->
<div id="modalForm" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
    <div class="relative p-4 w-full max-w-lg">
        <div class="relative bg-white rounded-2xl shadow-xl">
            <div class="flex items-center justify-between p-5 border-b border-slate-100">
                <h3 id="modalTitulo" class="text-base font-semibold text-slate-900">Crear Residuo</h3>
                <button th:replace="~{layouts/fragments :: modalCloseBtn('modalForm')}"></button>
            </div>
            <div class="p-5 grid grid-cols-2 gap-4">
                <input type="hidden" id="itemId">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Cantidad *</label>
                    <input type="number" id="fCantidad" class="form-control-eco" placeholder="0.00" min="0" step="0.01">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Unidad</label>
                    <input type="text" id="fUnidad" class="form-control-eco" placeholder="kg, L, t...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Estado</label>
                    <select id="fEstado" class="form-control-eco">
                        <option value="PENDIENTE">PENDIENTE</option>
                        <option value="ALMACENADO">ALMACENADO</option>
                        <option value="EN_TRANSITO">EN TRANSITO</option>
                        <option value="TRATADO">TRATADO</option>
                        <option value="ELIMINADO">ELIMINADO</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Codigo LER</label>
                    <div class="relative" id="lerCombo">
                        <input type="text" id="fCodigoLER" class="form-control-eco" autocomplete="off"
                               placeholder="Escribe codigo o descripcion..."
                               oninput="lerComboFiltrar(this.value)"
                               onfocus="lerComboMostrar()"
                               onblur="setTimeout(lerComboOcultar, 150)">
                        <ul id="lerComboList"
                            class="hidden absolute z-50 left-0 right-0 mt-1 max-h-56 overflow-y-auto bg-white border border-slate-200 rounded-xl shadow-lg text-sm">
                        </ul>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Entrada almacen</label>
                    <input type="datetime-local" id="fFechaEntrada" class="form-control-eco">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Días max. alm.</label>
                    <input type="number" id="fDiasMaximo" class="form-control-eco" placeholder="180" min="1">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Centro</label>
                    <div data-combobox="fCentro" data-placeholder="Buscar centro (o sin asignar)..."></div>
                </div>
            </div>
            <div th:replace="~{layouts/fragments :: modalFooter('modalForm', 'Guardar', 'guardar')}"></div>
        </div>
    </div>
</div>
</th:block>

<th:block th:fragment="pageScripts">
<script>
var todos = [], pagina = 1, filtro = '';
var POR_PAGINA = 15;
var mForm;

function initModales() {
    var el = document.getElementById('modalForm');
    if (el && typeof Modal !== 'undefined') mForm = new Modal(el, { backdrop:'dynamic', closable:true });
}

document.addEventListener('DOMContentLoaded', function() { initModales(); cargar(); cargarCentros(); cargarListaLer(); });

function estadoResiduoPill(estado) {
    if (typeof window.estadoResiduoBadge === 'function') return window.estadoResiduoBadge(estado);
    return esc(estado || '—');
}

function diasAlmacenBadge(r) {
    if (!r.fechaEntradaAlmacen) return '<span class="text-slate-400">\u2014</span>';
    if (r.fechaSalidaAlmacen) return '<span class="text-slate-400 text-xs">Salido</span>';
    var entrada = Array.isArray(r.fechaEntradaAlmacen)
        ? new Date(r.fechaEntradaAlmacen[0], r.fechaEntradaAlmacen[1]-1, r.fechaEntradaAlmacen[2])
        : new Date(r.fechaEntradaAlmacen);
    var dias = Math.floor((Date.now() - entrada.getTime()) / 86400000);
    var maximo = r.diasMaximoAlmacenamiento || 180;
    if (dias > maximo) return '<span class="badge badge-xs badge-error font-bold" title="Supera l\u00edmite FIFO">FIFO !' + dias + 'd</span>';
    if (dias > maximo * 0.8) return '<span class="badge badge-xs badge-warning">' + dias + 'd</span>';
    return '<span class="text-slate-500 text-xs">' + dias + 'd</span>';
}

function localDateTimeParaInput(arr) {
    if (!arr) return '';
    if (Array.isArray(arr)) {
        var y = arr[0], mo = arr[1].toString().padStart(2,'0'), d = arr[2].toString().padStart(2,'0');
        var h = arr[3] ? arr[3].toString().padStart(2,'0') : '00';
        var mi = arr[4] ? arr[4].toString().padStart(2,'0') : '00';
        return y + '-' + mo + '-' + d + 'T' + h + ':' + mi;
    }
    return arr.substring(0, 16);
}

async function cargarCentros() {
    var res = await fetch('/api/centros');
    var list = await res.json();
    Combobox.bind({
        id: 'fCentro',
        placeholder: 'Buscar centro (o sin asignar)...',
        emptyOption: { value: '', label: 'Sin asignar' },
        items: list.map(function(c) { return { value: c.id, label: c.nombre, sub: (c.tipo || '') }; })
    });
}

var _listaLer = [];
async function cargarListaLer() {
    try {
        var res = await fetch('/api/lista-ler');
        if (!res.ok) return;
        _listaLer = await res.json();
    } catch(e) { /* silencioso */ }
}
function lerComboRender(items) {
    var ul = document.getElementById('lerComboList');
    if (!ul) return;
    if (!items.length) {
        ul.innerHTML = '<li class="px-3 py-2 text-slate-400">Sin coincidencias</li>';
        return;
    }
    ul.innerHTML = items.slice(0, 50).map(function(l) {
        var code = esc(l.codigo);
        var desc = esc(l.descripcion);
        return '<li class="px-3 py-2 hover:bg-blue-50 cursor-pointer flex gap-2"'
             + ' onmousedown="lerComboSeleccionar(\'' + code.replace(/'/g, "\\'") + '\')">'
             + '<span class="font-mono text-slate-700 shrink-0">' + code + '</span>'
             + '<span class="text-slate-500 truncate">' + desc + '</span>'
             + '</li>';
    }).join('');
}
function lerComboFiltrar(value) {
    var v = (value || '').toLowerCase().trim();
    var items = !v ? _listaLer : _listaLer.filter(function(l) {
        return l.codigo.toLowerCase().includes(v) || l.descripcion.toLowerCase().includes(v);
    });
    lerComboRender(items);
    lerComboMostrar();
}
function lerComboMostrar() {
    var ul = document.getElementById('lerComboList');
    if (!ul) return;
    if (!ul.innerHTML.trim()) lerComboRender(_listaLer);
    ul.classList.remove('hidden');
}
function lerComboOcultar() {
    var ul = document.getElementById('lerComboList');
    if (ul) ul.classList.add('hidden');
}
function lerComboSeleccionar(codigo) {
    var input = document.getElementById('fCodigoLER');
    if (input) input.value = codigo;
    lerComboOcultar();
}
function descripcionDeLer(codigo) {
    var item = _listaLer.find(function(l) { return l.codigo === codigo; });
    return item ? item.descripcion : '';
}

async function cargar() {
    try {
        var res = await fetch('/api/residuos');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        todos = await res.json();
    } catch (err) {
        document.getElementById('tablaCuerpo').innerHTML =
            '<tr><td colspan="9" class="text-center py-12 text-red-400">Error al cargar datos. Recarga la p\u00e1gina.</td></tr>';
        return;
    }
    pagina = 1;
    renderTabla();
}

function filtrar() { filtro = document.getElementById('busqueda').value.toLowerCase(); pagina = 1; renderTabla(); }

function renderTabla() {
    var lista = todos.filter(function(r) {
        return (r.codigoLER || '').toLowerCase().includes(filtro) ||
               (r.descripcion || '').toLowerCase().includes(filtro) ||
               (r.estado || '').toLowerCase().includes(filtro);
    });
    var inicio = (pagina - 1) * POR_PAGINA;
    var slice = lista.slice(inicio, inicio + POR_PAGINA);
    var total = lista.length;
    var totalPags = Math.max(1, Math.ceil(total / POR_PAGINA));

    document.getElementById('infoReg').textContent = total === 0
        ? 'Sin registros'
        : 'Mostrando ' + (inicio + 1) + '\u2013' + Math.min(inicio + POR_PAGINA, total) + ' de ' + total;

    document.getElementById('tablaCuerpo').innerHTML = slice.length === 0
        ? '<tr><td colspan="9" class="text-center py-12 text-slate-400">Sin resultados</td></tr>'
        : slice.map(function(r) {
            return '<tr class="hover" ondblclick="abrirEditar(' + r.id + ')">'
                + '<td class="w-10 pr-0"><input type="checkbox" class="checkbox checkbox-xs batch-check" value="' + r.id + '" onchange="actualizarBatchBar()" onclick="event.stopPropagation()"></td>'
                + '<td class="text-xs text-slate-400">' + r.id + '</td>'
                + '<td class="font-medium font-mono text-sm">' + esc(r.codigoLER || '\u2014') + '</td>'
                + '<td class="text-sm text-slate-500">' + esc(r.descripcion || '\u2014') + '</td>'
                + '<td class="text-sm">' + (r.cantidad != null ? r.cantidad : '\u2014') + '</td>'
                + '<td class="text-sm">' + esc(r.unidad || '\u2014') + '</td>'
                + '<td>' + estadoResiduoPill(r.estado) + '</td>'
                + '<td class="hidden md:table-cell">' + diasAlmacenBadge(r) + '</td>'
                + '<td class="text-sm text-slate-500 hidden lg:table-cell">' + esc(r.centro ? r.centro.nombre : '\u2014') + '</td>'
                + '<td class="text-right whitespace-nowrap">'
                + '  <button class="btn btn-ghost btn-xs tooltip" data-tip="Editar" onclick="abrirEditar(' + r.id + ')"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>'
                + '  <button class="btn btn-ghost btn-xs text-red-500 tooltip" data-tip="Eliminar" onclick="pedirBorrar(' + r.id + ')"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg></button>'
                + '</td></tr>';
        }).join('');

    document.getElementById('pgBotones').innerHTML = Array.from({ length: totalPags }, function(_, i) { return i + 1; })
        .map(function(i) { return '<button class="join-item btn btn-xs ' + (i === pagina ? 'bg-[#3b82f6] text-white border-none' : '') + '" onclick="irPagina(' + i + ')">' + i + '</button>'; }).join('');
}

function irPagina(n) { pagina = n; renderTabla(); }

function abrirCrear() {
    document.getElementById('modalTitulo').textContent = 'Crear Residuo';
    document.getElementById('itemId').value = '';
    ['fCantidad','fUnidad'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('fCodigoLER').value = '';
    document.getElementById('fEstado').value = 'PENDIENTE';
    document.getElementById('fFechaEntrada').value = '';
    document.getElementById('fDiasMaximo').value = '180';
    Combobox.clear('fCentro');
    if (window.refreshChoices) {
        window.refreshChoices(document.getElementById('fEstado'));
    }
    mForm && mForm.show();
}

async function abrirEditar(id) {
    var r = await fetch('/api/residuos/' + id).then(function(res) { return res.json(); });
    document.getElementById('modalTitulo').textContent = 'Editar Residuo';
    document.getElementById('itemId').value = r.id;
    document.getElementById('fCantidad').value = r.cantidad != null ? r.cantidad : '';
    document.getElementById('fUnidad').value = r.unidad || '';
    document.getElementById('fEstado').value = r.estado || 'PENDIENTE';
    document.getElementById('fCodigoLER').value = r.codigoLER || '';
    document.getElementById('fFechaEntrada').value = r.fechaEntradaAlmacen ? localDateTimeParaInput(r.fechaEntradaAlmacen) : '';
    document.getElementById('fDiasMaximo').value = r.diasMaximoAlmacenamiento != null ? r.diasMaximoAlmacenamiento : '180';
    Combobox.setValue('fCentro', r.centro ? r.centro.id : '');
    if (window.refreshChoices) {
        window.refreshChoices(document.getElementById('fEstado'));
    }
    mForm && mForm.show();
}

async function guardar() {
    var id = document.getElementById('itemId').value;
    var centroId = document.getElementById('fCentro').value;
    var body = {
        cantidad: parseFloat(document.getElementById('fCantidad').value),
        unidad: document.getElementById('fUnidad').value.trim(),
        estado: document.getElementById('fEstado').value,
        codigoLER: document.getElementById('fCodigoLER').value.trim(),
        descripcion: descripcionDeLer(document.getElementById('fCodigoLER').value.trim()),
        fechaEntradaAlmacen: document.getElementById('fFechaEntrada').value || null,
        diasMaximoAlmacenamiento: parseInt(document.getElementById('fDiasMaximo').value) || 180,
        centro: centroId ? { id: parseInt(centroId) } : null
    };
    var res = await fetch(id ? '/api/residuos/' + id : '/api/residuos', {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (res.ok) { mForm && mForm.hide(); await cargar(); }
    else { Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo guardar el residuo.' }); }
}

async function pedirBorrar(id) {
    var result = await Swal.fire({
        title: 'Eliminar residuo?',
        text: 'Esta accion no se puede deshacer.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonText: 'Cancelar',
        confirmButtonText: 'Eliminar'
    });
    if (!result.isConfirmed) return;
    var res = await fetch('/api/residuos/' + id, { method: 'DELETE' });
    if (res.ok || res.status === 204) { await cargar(); }
    else {
        var data = await res.json().catch(function() { return {}; });
        Swal.fire({ icon: 'error', title: 'No se puede eliminar', text: data.error || 'Error al eliminar.' });
    }
}
async function borrarSeleccionados() {
    var ids = getSeleccionados();
    if (!ids.length) return;
    var result = await Swal.fire({
        title: 'Eliminar ' + ids.length + ' residuo(s)?',
        text: 'Solo se eliminan residuos sin traslados asociados.',
        icon: 'warning', showCancelButton: true,
        confirmButtonColor: '#ef4444', cancelButtonText: 'Cancelar', confirmButtonText: 'Eliminar'
    });
    if (!result.isConfirmed) return;
    var errors = [];
    for (var id of ids) {
        var res = await fetch('/api/residuos/' + id, { method: 'DELETE' });
        if (!res.ok && res.status !== 204) {
            var d = await res.json().catch(function(){ return {}; });
            errors.push((d.error || 'Error') + ' (ID ' + id + ')');
        }
    }
    limpiarSeleccion();
    await cargar();
    if (errors.length) Swal.fire({ icon: 'warning', title: 'Algunos no se pudieron eliminar', text: errors.join('\n') });
}
</script>
</th:block>
</body>
</html>
