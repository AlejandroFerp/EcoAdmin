<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>EcoAdmin — Panel</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f5f7f9; }
        .navbar-brand { font-weight: 700; font-size: 1.3rem; letter-spacing: 0.5px; }
        .stat-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            transition: transform 0.15s;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }
        .quick-btn {
            border-radius: 10px;
            padding: 1rem;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .quick-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,.12);
        }
        .chart-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background:#1a6b3c;">
    <div class="container-fluid px-4">
        <span class="navbar-brand">🌿 EcoAdmin</span>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white-50 small" sec:authentication="name">usuario</span>
            <a th:href="@{/logout}" class="btn btn-outline-light btn-sm px-3">Cerrar sesión</a>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 py-4">

    <div class="mb-4">
        <h5 class="fw-bold mb-0">Panel de control</h5>
        <p class="text-muted small mb-0">Resumen del sistema EcoAdmin</p>
    </div>

    <!-- Tarjetas métricas -->
    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3">
            <div class="stat-card card p-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background:#e8f5e9;">🏭</div>
                    <div>
                        <p class="mb-0 text-muted small">Centros registrados</p>
                        <h4 class="mb-0 fw-bold" th:text="${totalCentros}">0</h4>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="stat-card card p-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background:#fff8e1;">☢️</div>
                    <div>
                        <p class="mb-0 text-muted small">Residuos activos</p>
                        <h4 class="mb-0 fw-bold" th:text="${totalResiduos}">0</h4>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="stat-card card p-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background:#e3f2fd;">🚛</div>
                    <div>
                        <p class="mb-0 text-muted small">Traslados en curso</p>
                        <h4 class="mb-0 fw-bold" th:text="${trasladosEnCurso}">0</h4>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="stat-card card p-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="stat-icon" style="background:#f3e5f5;">✅</div>
                    <div>
                        <p class="mb-0 text-muted small">Traslados completados</p>
                        <h4 class="mb-0 fw-bold" th:text="${trasladosCompletados}">0</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Gráfico + accesos rápidos -->
    <div class="row g-3 mb-4">
        <div class="col-lg-6">
            <div class="chart-card card p-3">
                <h6 class="fw-semibold mb-3 text-muted">Estado de traslados</h6>
                <canvas id="graficaTraslados" height="200"></canvas>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="chart-card card p-3">
                <h6 class="fw-semibold mb-3 text-muted">Actividad del sistema</h6>
                <canvas id="graficaActividad" height="200"></canvas>
            </div>
        </div>
    </div>

    <!-- Accesos rápidos -->
    <div class="row g-3">
        <div class="col-md-4">
            <a href="#" class="btn quick-btn btn-outline-success w-100">🏭 Gestionar Centros</a>
        </div>
        <div class="col-md-4">
            <a href="#" class="btn quick-btn btn-outline-warning w-100">☢️ Gestionar Residuos</a>
        </div>
        <div class="col-md-4">
            <a href="#" class="btn quick-btn btn-outline-primary w-100">🚛 Gestionar Traslados</a>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    const enCurso       = /*[[${trasladosEnCurso}]]*/    0;
    const completados   = /*[[${trasladosCompletados}]]*/ 0;
    const totalCentros  = /*[[${totalCentros}]]*/         0;
    const totalResiduos = /*[[${totalResiduos}]]*/        0;

    new Chart(document.getElementById('graficaTraslados'), {
        type: 'doughnut',
        data: {
            labels: ['En curso', 'Completados'],
            datasets: [{
                data: [enCurso, completados],
                backgroundColor: ['#2d9e5f', '#6c757d'],
                borderWidth: 0
            }]
        },
        options: {
            plugins: { legend: { position: 'bottom' } },
            cutout: '65%'
        }
    });

    new Chart(document.getElementById('graficaActividad'), {
        type: 'bar',
        data: {
            labels: ['Centros', 'Residuos', 'En curso', 'Completados'],
            datasets: [{
                label: 'Totales',
                data: [totalCentros, totalResiduos, enCurso, completados],
                backgroundColor: ['#1a6b3c', '#ffc107', '#0d6efd', '#6c757d'],
                borderRadius: 6
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
        }
    });
</script>
</body>
</html>
