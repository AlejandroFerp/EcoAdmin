<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- ===================================================================
     BARRA DE BÚSQUEDA ESTÁNDAR
     Uso: <div th:replace="~{layouts/fragments :: searchBar('Buscar...')}"></div>
     =================================================================== -->
<div th:fragment="searchBar(placeholder)" class="mb-4">
    <div class="relative w-full sm:max-w-xs">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="busqueda" th:placeholder="${placeholder}" oninput="filtrar()"
               class="input input-sm w-full pl-9 bg-white border border-slate-200 rounded-lg
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
    </div>
</div>

<!-- ===================================================================
     PIE DE PAGINACIÓN ESTÁNDAR
     Uso: <div th:replace="~{layouts/fragments :: paginationBar}"></div>
     =================================================================== -->
<div th:fragment="paginationBar"
     class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mt-4">
    <span class="text-xs text-slate-500" id="infoReg"></span>
    <div class="join" id="pgBotones"></div>
</div>

<!-- ===================================================================
     BOTÓN CERRAR MODAL (X)
     Uso: <button th:replace="~{layouts/fragments :: modalCloseBtn('modalForm')}"></button>
     =================================================================== -->
<button th:fragment="modalCloseBtn(modalId)" type="button"
        th:attr="data-modal-close=${modalId}" aria-label="Cerrar"
        class="text-slate-400 hover:text-slate-700 rounded-lg p-1.5 hover:bg-slate-100">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 14 14">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
              stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
    </svg>
</button>

<!-- ===================================================================
     PIE DE MODAL (Cancelar + botón primario configurable)
     Uso: <div th:replace="~{layouts/fragments :: modalFooter('modalForm', 'Guardar', 'guardar')}"></div>
     =================================================================== -->
<div th:fragment="modalFooter(modalId, saveLabel, saveAction)"
     class="modal-foot">
    <button type="button" th:attr="data-modal-close=${modalId}" class="btn-ghost-eco">Cancelar</button>
    <button type="button"
            th:attr="data-action=${saveAction}"
            onclick="window[this.dataset.action] && window[this.dataset.action]()"
            class="btn-primary"
            th:text="${saveLabel}">Guardar</button>
</div>

<!-- ===================================================================
     CRUD MODAL WRAPPER
     Uso basico (heredado, layout vertical space-y-4):
       <div th:replace="~{layouts/fragments :: crudModal('modalForm', 'sm', 'Titulo', 'guardar', ~{::modalBody})}"></div>
     Uso extendido (saveLabel y bodyClass personalizables):
       <div th:replace="~{layouts/fragments :: crudModalEx('modalForm', 'md', 'Crear Direccion', 'guardar', 'Guardar', 'grid grid-cols-2 gap-4', ~{::modalBody})}"></div>
     ID del titulo: th:id=${id}+'Titulo' (p.ej. modalFormTitulo) para evitar colisiones de id si hay varios crudModal en una vista.
     =================================================================== -->
<div th:fragment="crudModal(id, size, title, saveAction, bodyFragment)"
     th:replace="~{layouts/fragments :: crudModalEx(${id}, ${size}, ${title}, ${saveAction}, 'Guardar', 'space-y-4', ${bodyFragment})}">
</div>

<div th:fragment="crudModalEx(id, size, title, saveAction, saveLabel, bodyClass, bodyFragment)"
     th:id="${id}" tabindex="-1" aria-hidden="true" class="modal-overlay hidden">
    <div th:class="'modal-shell modal-shell--' + ${size}">
        <div class="modal-card">
            <div class="modal-head">
                <h3 class="modal-title" th:id="${id} + 'Titulo'" th:text="${title}"></h3>
                <button th:replace="~{layouts/fragments :: modalCloseBtn(${id})}"></button>
            </div>
            <div th:class="'modal-body ' + ${bodyClass}" th:insert="${bodyFragment}">
            </div>
            <div th:replace="~{layouts/fragments :: modalFooter(${id}, ${saveLabel}, ${saveAction})}"></div>
        </div>
    </div>
</div>

</body>
</html>
