<!DOCTYPE html>
<html lang="es"
      th:fragment="layout(pageId, pageTitle, pageHeading, pageContent, pageScripts)"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">EcoAdmin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/app.css}">
        </head>
<body class="bg-[#f1f5f9] min-h-screen" data-theme="light">

<!-- SIDEBAR -->
<aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-[260px] bg-[#1e2a3b] flex flex-col -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">

    <!-- Logo (clicable: vuelve al dashboard) -->
    <a th:href="@{/index}" class="flex items-center gap-3 px-6 py-5 border-b border-white/10 shrink-0 hover:bg-white/5 transition-colors">
        <div class="w-9 h-9 rounded-xl bg-[#3b82f6] flex items-center justify-center text-white shadow-lg">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
        </div>
        <span class="font-bold text-white text-[15px] tracking-tight">EcoAdmin</span>
    </a>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto py-3 px-3 space-y-0.5">

        <!-- PRINCIPAL group -->
        <button onclick="toggleNavGroup('grp-principal')"
                class="w-full flex items-center justify-between px-3 py-1.5 text-[10px] font-semibold text-slate-500 uppercase tracking-widest hover:text-slate-400 transition-colors">
            <span>Inicio</span>
            <svg id="grp-principal-ic" class="w-3 h-3 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="grp-principal" class="nav-group-body space-y-0.5 pl-1">
                <a th:href="@{/dashboard}"
                    th:class="${pageId == 'dashboard'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                Dashboard
            </a>
                <a th:href="@{/shipments}"
                    th:class="${pageId == 'shipments'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                Traslados
            </a>
                <a th:href="@{/routes}"
                    th:class="${pageId == 'routes'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
                Rutas
            </a>
        </div>

        <!-- ALMACÉN -->
          <a th:href="@{/waste}"
              th:class="${pageId == 'waste'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all mt-1' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all mt-1'">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/></svg>
            Almacén
        </a>

        <!-- CONTACTOS group -->
        <button onclick="toggleNavGroup('grp-contactos')"
                class="w-full flex items-center justify-between px-3 py-1.5 text-[10px] font-semibold text-slate-500 uppercase tracking-widest hover:text-slate-400 transition-colors mt-1">
            <span>Registros</span>
            <svg id="grp-contactos-ic" class="w-3 h-3 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="grp-contactos" class="nav-group-body space-y-0.5 pl-1">
                <a th:href="@{/centers}"
                    th:class="${pageId == 'centers'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                Centros
            </a>
                <a th:href="@{/users}"
                    th:class="${pageId == 'users'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-4-4h-1M9 20H4v-2a4 4 0 014-4h1m8-4a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                Usuarios
            </a>
                <a th:href="@{/solicitudes}" sec:authorize="hasRole('ADMIN')"
                    th:class="${pageId == 'solicitudes'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                Solicitudes
            </a>
                <a th:href="@{/addresses}"
                    th:class="${pageId == 'addresses'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Direcciones
            </a>
        </div>

        <!-- NEGOCIO -->
          <a th:href="@{/business}"
              th:class="${pageId == 'business'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all mt-1' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all mt-1'">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            Negocio
        </a>

        <!-- MIS DATOS -->
          <a th:href="@{/profile}"
              th:class="${pageId == 'profile'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Mis Datos
        </a>

        <!-- DOCUMENTOS -->
          <a th:href="@{/documents}"
              th:class="${pageId == 'documents'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all mt-1' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all mt-1'">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Documentos
        </a>

        <!-- INFORMES -->
          <a th:href="@{/reports}" title="Informes y exportaciones"
              th:class="${pageId == 'reports'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Informes
        </a>

    </nav>

    <!-- User footer -->
    <div class="shrink-0 border-t border-white/10 p-4">
        <div class="flex items-center gap-3">
            <img th:if="${usuarioActual != null and usuarioActual.fotoUrl != null and !#strings.isEmpty(usuarioActual.fotoUrl)}"
                 th:src="${usuarioActual.fotoUrl}" alt="Foto"
                 class="w-9 h-9 rounded-full object-cover shrink-0 ring-2 ring-white/20">
            <div th:unless="${usuarioActual != null and usuarioActual.fotoUrl != null and !#strings.isEmpty(usuarioActual.fotoUrl)}"
                 class="w-9 h-9 rounded-full bg-[#3b82f6] flex items-center justify-center text-white text-xs font-bold shrink-0"
                 th:text="${usuarioActual != null ? #strings.toUpperCase(#strings.substring(usuarioActual.nombre,0,1)) : 'A'}">A</div>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-white truncate" sec:authentication="name">Admin</p>
                <p class="text-[11px] text-slate-400">Administrador</p>
            </div>
            <button id="darkToggle" type="button" title="Modo oscuro"
                    onclick="toggleDarkMode()"
                    class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:bg-white/10 hover:text-white transition-all">
                <svg id="darkIcon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
            </button>
            <form th:action="@{/logout}" method="post" class="shrink-0 m-0 p-0">
                <button type="submit" title="Cerrar sesion"
                        class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:bg-red-500/20 hover:text-red-400 transition-all">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</aside>

<div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 lg:hidden hidden" onclick="closeSidebar()"></div>

<!-- MAIN WRAPPER -->
<div class="lg:ml-[260px] min-h-screen flex flex-col">

    <!-- Top header -->
    <header class="sticky top-0 z-30 bg-white border-b border-slate-200 flex items-center h-16 px-4 sm:px-6 gap-4 shrink-0 shadow-sm">
        <button type="button" onclick="openSidebar()" class="lg:hidden p-2 rounded-lg text-slate-500 hover:bg-slate-100 transition">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
        <a th:href="@{/dashboard}" class="flex items-center gap-2 text-sm text-slate-500 hover:text-slate-800 transition-colors" title="Ir al dashboard">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l9-9 9 9M5 10v10h4v-6h6v6h4V10"/></svg>
        </a>
        <!-- BREADCRUMB (Fase 17.8) -->
        <nav th:with="grupo=${ {'dashboard':'Principal','shipments':'Principal','routes':'Principal','statistics':'Principal','waste':'Almacen','centers':'Contactos','users':'Contactos','addresses':'Contactos','business':'Negocio','profile':'Mis Datos','documents':'Documentos','reports':'Informes','solicitudes':'Contactos','solicitudes':'Contactos'} },
                      grupoActual=${grupo.containsKey(pageId) ? grupo.get(pageId) : 'EcoAdmin'},
                  esRaiz=${pageId == 'dashboard'}"
             class="flex items-center gap-1.5 text-sm">
            <svg class="w-3.5 h-3.5 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
            <span class="text-slate-500" th:text="${grupoActual}">Principal</span>
            <th:block th:unless="${esRaiz or grupoActual == pageHeading}">
                <svg class="w-3.5 h-3.5 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                <span class="font-semibold text-slate-800" th:text="${pageHeading}">Pagina</span>
            </th:block>
            <th:block th:if="${esRaiz or grupoActual == pageHeading}">
                <span class="font-semibold text-slate-800 -ml-1" th:text="''"></span>
            </th:block>
        </nav>
        <div class="flex-1"></div>
        <!-- Notification bell (27.5) -->
        <div class="relative" id="notifBell" sec:authorize="isAuthenticated()">
            <button type="button" onclick="toggleNotifPanel()" class="relative p-2 rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                </svg>
                <span id="notifBadge" class="hidden absolute -top-0.5 -right-0.5 w-5 h-5 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">0</span>
            </button>
            <div id="notifPanel" class="hidden absolute right-0 top-full mt-2 w-80 bg-white border border-slate-200 rounded-xl shadow-xl z-50 max-h-96 overflow-y-auto">
                <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
                    <span class="text-sm font-semibold text-slate-800">Notificaciones</span>
                    <button id="notifMarkAllBtn"
                            type="button"
                            onclick="markAllRead(event)"
                            class="rounded-lg p-1.5 text-slate-400 transition hover:bg-slate-100 hover:text-slate-600 disabled:cursor-not-allowed disabled:opacity-40"
                            title="No hay notificaciones sin leer"
                            aria-label="No hay notificaciones sin leer"
                            disabled>
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 7.5v9A2.25 2.25 0 0119.5 18.75h-15A2.25 2.25 0 012.25 16.5v-9m19.5 0A2.25 2.25 0 0019.5 5.25h-15A2.25 2.25 0 002.25 7.5m19.5 0l-8.69 5.793a1.5 1.5 0 01-1.67 0L2.25 7.5"/>
                        </svg>
                    </button>
                </div>
                <div id="notifList" class="divide-y divide-slate-100">
                    <p class="text-center text-sm text-slate-400 py-6">Sin notificaciones</p>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-2.5 pl-4 border-l border-slate-200">
            <img th:if="${usuarioActual != null and usuarioActual.fotoUrl != null and !#strings.isEmpty(usuarioActual.fotoUrl)}"
                 th:src="${usuarioActual.fotoUrl}" alt="Foto"
                 class="w-8 h-8 rounded-full object-cover ring-1 ring-slate-200">
            <div th:unless="${usuarioActual != null and usuarioActual.fotoUrl != null and !#strings.isEmpty(usuarioActual.fotoUrl)}"
                 class="w-8 h-8 rounded-full bg-[#3b82f6] flex items-center justify-center text-white text-xs font-bold"
                 th:text="${usuarioActual != null ? #strings.toUpperCase(#strings.substring(usuarioActual.nombre,0,1)) : 'A'}">A</div>
            <span class="hidden sm:block text-sm font-medium text-slate-700" sec:authentication="name">Admin</span>
        </div>
    </header>

    <!-- Page content -->
    <th:block th:replace="${pageContent}"></th:block>
</div>

<!-- BATCH ACTION BAR (shared, controlled per page via actualizarBatchBar()) -->
<div id="batchBar"
     class="hidden fixed bottom-0 left-0 lg:left-[260px] right-0 z-40 flex items-center justify-between px-6 py-3 bg-slate-900 text-white shadow-2xl"
     style="transition: transform 0.2s ease; transform: translateY(100%);">
    <span class="text-sm font-medium"><span id="batchCount">0</span> seleccionados</span>
    <div class="flex items-center gap-3">
        <button onclick="limpiarSeleccion()"
                class="btn btn-sm btn-ghost text-slate-300 hover:text-white normal-case">Cancelar</button>
        <button id="batchDeleteBtn" onclick="borrarSeleccionados()"
                class="btn btn-sm bg-red-500 hover:bg-red-600 text-white border-none normal-case">
            <svg class="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            Eliminar seleccionados
        </button>
    </div>
</div>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>

<!-- ─── ESTADO_CONFIG y helper estadoBadge globales ─── -->
<script>
(function() {
    window.ESTADO_CONFIG = {
        PENDIENTE:   { label: 'Pendiente'   },
        EN_TRANSITO: { label: 'En tránsito' },
        ENTREGADO:   { label: 'Entregado'   },
        COMPLETADO:  { label: 'Completado'  },
        CANCELADO:   { label: 'Cancelado'   }
    };
    function escEstado(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c];}); }

// ─── Combobox FK reutilizable ───────────────────────────────────────────────
// Uso:
//   <div data-combobox="fProductor" data-placeholder="Buscar centro..."></div>
//   Combobox.bind({ id:'fProductor', items:[{value, label, sub?}], placeholder?, emptyOption?, onChange? });
//   Combobox.setValue('fProductor', id);   // selecciona por value
//   Combobox.clear('fProductor');
//   document.getElementById('fProductor').value  // sigue devolviendo el value seleccionado
window.Combobox = (function() {
    var registry = {};
    function escLocal(s) {
        if (s == null) return '';
        var d = document.createElement('div'); d.textContent = String(s); return d.innerHTML;
    }
    function ensure(id, placeholder) {
        if (registry[id]) return registry[id];
        var anchor = document.querySelector('[data-combobox="' + id + '"]');
        if (!anchor) { console.warn('[Combobox] anchor no encontrado para id=' + id); return null; }
        anchor.classList.add('relative');
        anchor.innerHTML =
            '<input type="text" class="form-control-eco combobox-display" autocomplete="off"' +
            '       placeholder="' + escLocal(placeholder || anchor.getAttribute('data-placeholder') || 'Buscar...') + '">' +
            '<input type="hidden" id="' + id + '">' +
            '<ul class="combobox-list hidden absolute z-50 left-0 right-0 mt-1 max-h-56 overflow-y-auto bg-white border border-slate-200 rounded-xl shadow-lg text-sm"></ul>';
        var disp = anchor.querySelector('.combobox-display');
        var hidden = anchor.querySelector('input[type="hidden"]');
        var list = anchor.querySelector('.combobox-list');
        var entry = { id:id, anchor:anchor, disp:disp, hidden:hidden, list:list, items:[], onChange:null, emptyOption:null };
        registry[id] = entry;
        disp.addEventListener('input', function() { filtrar(id, disp.value); });
        disp.addEventListener('focus', function() { mostrar(id); });
        disp.addEventListener('blur',  function() { setTimeout(function(){ ocultar(id); }, 150); });
        disp.addEventListener('keydown', function(ev) {
            if (ev.key === 'Escape') { disp.blur(); }
            if (ev.key === 'Enter')  { ev.preventDefault(); }
        });
        return entry;
    }
    function bind(opts) {
        var e = ensure(opts.id, opts.placeholder);
        if (!e) return;
        if (opts.placeholder) e.disp.placeholder = opts.placeholder;
        e.onChange = opts.onChange || null;
        e.emptyOption = opts.emptyOption || null; // {value:'', label:'Sin asignar'}
        e.items = (opts.items || []).map(function(it) {
            return {
                value: String(it.value),
                label: String(it.label == null ? '' : it.label),
                sub:   it.sub == null ? '' : String(it.sub)
            };
        });
        // Re-render lista si visible y refresca display si había valor
        var v = e.hidden.value;
        if (v) setValue(opts.id, v);
        if (!e.list.classList.contains('hidden')) render(opts.id, e.items);
    }
    function listAll(e) {
        if (e.emptyOption) {
            return [{ value: String(e.emptyOption.value || ''), label: e.emptyOption.label, sub: '', _empty:true }].concat(e.items);
        }
        return e.items;
    }
    function render(id, items) {
        var e = registry[id]; if (!e) return;
        if (!items.length) {
            e.list.innerHTML = '<li class="px-3 py-2 text-slate-400">Sin coincidencias</li>';
            return;
        }
        e.list.innerHTML = items.slice(0, 100).map(function(it) {
            var label = escLocal(it.label);
            var sub = escLocal(it.sub || '');
            var val = String(it.value).replace(/"/g,'&quot;');
            return '<li data-value="' + val + '" class="px-3 py-2 hover:bg-blue-50 cursor-pointer flex gap-2 items-baseline">' +
                   '<span class="text-slate-700 shrink-0">' + (label || '<span class="text-slate-400">—</span>') + '</span>' +
                   (sub ? '<span class="text-slate-500 truncate text-xs">' + sub + '</span>' : '') +
                   '</li>';
        }).join('');
        Array.prototype.forEach.call(e.list.children, function(li) {
            li.addEventListener('mousedown', function(ev) {
                ev.preventDefault();
                seleccionar(id, li.getAttribute('data-value'));
            });
        });
    }
    function filtrar(id, value) {
        var e = registry[id]; if (!e) return;
        var v = (value || '').toLowerCase().trim();
        var pool = listAll(e);
        var items = !v ? pool : pool.filter(function(it) {
            return it.label.toLowerCase().indexOf(v) !== -1 ||
                   (it.sub || '').toLowerCase().indexOf(v) !== -1;
        });
        render(id, items);
        mostrar(id);
        if (!value) { e.hidden.value = ''; if (e.onChange) try { e.onChange('', null); } catch(_){} }
    }
    function mostrar(id) {
        var e = registry[id]; if (!e) return;
        if (!e.list.innerHTML.trim()) render(id, listAll(e));
        e.list.classList.remove('hidden');
    }
    function ocultar(id) {
        var e = registry[id]; if (!e) return;
        e.list.classList.add('hidden');
        // Restaurar display al label del valor actual (si quedó texto huérfano)
        var v = e.hidden.value;
        if (v) {
            var hit = e.items.find(function(it) { return it.value === String(v); });
            e.disp.value = hit ? hit.label : '';
        } else {
            e.disp.value = '';
        }
    }
    function seleccionar(id, value) {
        var e = registry[id]; if (!e) return;
        if (e.emptyOption && String(value) === String(e.emptyOption.value || '')) {
            e.hidden.value = '';
            e.disp.value = '';
            ocultar(id);
            if (e.onChange) try { e.onChange('', null); } catch(_){}
            return;
        }
        var hit = e.items.find(function(it) { return it.value === String(value); });
        if (!hit) return;
        e.hidden.value = hit.value;
        e.disp.value = hit.label;
        ocultar(id);
        if (e.onChange) try { e.onChange(hit.value, hit); } catch(_){}
    }
    function setValue(id, value) {
        var e = registry[id]; if (!e) return;
        if (value === '' || value == null) {
            e.hidden.value = '';
            e.disp.value = '';
            return;
        }
        var hit = e.items.find(function(it) { return it.value === String(value); });
        e.hidden.value = String(value);
        e.disp.value = hit ? hit.label : '';
    }
    function clear(id) { setValue(id, ''); }
    function getValue(id) {
        var e = registry[id]; if (!e) return '';
        return e.hidden.value;
    }
    return { bind:bind, setValue:setValue, clear:clear, getValue:getValue };
})();
</script>

// ─── Modal Draggable (Fase UX) ──────────────────────────────────────────────
document.addEventListener('mousedown', function(e) {
    var head = e.target.closest('.modal-head');
    if (!head) return;
    var shell = head.closest('.modal-shell');
    if (!shell) return;
    if (e.target.closest('button')) return; // Ignore close buttons

    var startX = e.clientX;
    var startY = e.clientY;
    
    // Read existing transform
    var match = shell.style.transform.match(/translate\(([-\d.]+)px,\s*([-\d.]+)px\)/);
    var currentTx = match ? parseFloat(match[1]) : 0;
    var currentTy = match ? parseFloat(match[2]) : 0;
    
    // Set cursor
    head.style.cursor = 'grabbing';

    function onMouseMove(moveEvent) {
        var dx = moveEvent.clientX - startX;
        var dy = moveEvent.clientY - startY;
        shell.style.transform = 'translate(' + (currentTx + dx) + 'px, ' + (currentTy + dy) + 'px)';
    }
    function onMouseUp() {
        head.style.cursor = '';
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
    }
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
});

// ─── Shared iframe preview modal lifecycle ─────────────────────────────────
var iframePreviewRegistry = {};

function registerIframePreviewModal(modalId, config) {
    iframePreviewRegistry[modalId] = {
        iframeId: config.iframeId,
        loaderId: config.loaderId,
        errorBoxId: config.errorBoxId,
        errorMessageSelector: config.errorMessageSelector || null,
        defaultErrorMessage: config.defaultErrorMessage || 'No se pudo cargar la vista previa.',
        timeoutMs: config.timeoutMs || 6000,
        timeoutId: null
    };
}

function getIframePreviewConfig(modalId) {
    return iframePreviewRegistry[modalId] || null;
}

function setIframePreviewError(modalId, message) {
    var config = getIframePreviewConfig(modalId);
    if (!config) return;
    var iframe = document.getElementById(config.iframeId);
    var loader = document.getElementById(config.loaderId);
    var errorBox = document.getElementById(config.errorBoxId);
    if (config.timeoutId) {
        clearTimeout(config.timeoutId);
        config.timeoutId = null;
    }
    if (iframe) iframe.classList.add('hidden');
    if (loader) loader.classList.add('hidden');
    if (errorBox) {
        var target = config.errorMessageSelector ? errorBox.querySelector(config.errorMessageSelector) : null;
        if (target) target.textContent = message || config.defaultErrorMessage;
        errorBox.classList.remove('hidden');
    }
}

function resetIframePreviewState(modalId) {
    var config = getIframePreviewConfig(modalId);
    if (!config) return;
    var iframe = document.getElementById(config.iframeId);
    var loader = document.getElementById(config.loaderId);
    var errorBox = document.getElementById(config.errorBoxId);
    if (config.timeoutId) {
        clearTimeout(config.timeoutId);
        config.timeoutId = null;
    }
    if (iframe) {
        iframe.onload = null;
        iframe.onerror = null;
        if (iframe._blobUrl) {
            URL.revokeObjectURL(iframe._blobUrl);
            iframe._blobUrl = null;
        }
        iframe.src = 'about:blank';
        iframe.classList.add('hidden');
    }
    if (loader) loader.classList.add('hidden');
    if (errorBox) errorBox.classList.add('hidden');
}

function openIframePreviewModal(modalId, src, options) {
    var config = getIframePreviewConfig(modalId);
    var modal = document.getElementById(modalId);
    if (!config || !modal) return false;

    var iframe = document.getElementById(config.iframeId);
    var loader = document.getElementById(config.loaderId);
    var errorBox = document.getElementById(config.errorBoxId);
    var timeoutMessage = (options && options.timeoutMessage) || config.defaultErrorMessage;

    resetIframePreviewState(modalId);

    if (!iframe) return false;
    if (loader) loader.classList.remove('hidden');
    if (errorBox) errorBox.classList.add('hidden');
    modal.classList.remove('hidden');

    iframe.onload = function() {
        if (config.timeoutId) {
            clearTimeout(config.timeoutId);
            config.timeoutId = null;
        }
        if (loader) loader.classList.add('hidden');
        iframe.classList.remove('hidden');
        iframe.onload = null;
        iframe.onerror = null;
    };
    iframe.onerror = function() {
        setIframePreviewError(modalId, config.defaultErrorMessage);
    };
    config.timeoutId = setTimeout(function() {
        setIframePreviewError(modalId, timeoutMessage);
    }, config.timeoutMs);
    iframe.src = src;
    return true;
}

function closeIframePreviewModal(modalId) {
    resetIframePreviewState(modalId);
    var modal = document.getElementById(modalId);
    if (modal) modal.classList.add('hidden');
}

// ─── Batch actions (shared utilities) ───────────────────────────────────────
function getSeleccionados() {
    return Array.from(document.querySelectorAll('.batch-check:checked')).map(function(cb) { return cb.value; });
}
function actualizarBatchBar() {
    var ids = getSeleccionados();
    var bar = document.getElementById('batchBar');
    if (ids.length > 0) {
        bar.classList.remove('hidden');
        requestAnimationFrame(function() { bar.style.transform = 'translateY(0)'; });
        document.getElementById('batchCount').textContent = ids.length;
    } else {
        bar.style.transform = 'translateY(100%)';
        setTimeout(function() {
            if (getSeleccionados().length === 0) bar.classList.add('hidden');
        }, 210);
    }
}
function seleccionarTodos(cb) {
    document.querySelectorAll('.batch-check').forEach(function(c) { c.checked = cb.checked; });
    actualizarBatchBar();
}
function limpiarSeleccion() {
    document.querySelectorAll('.batch-check, #selAll').forEach(function(c) { c.checked = false; });
    actualizarBatchBar();
}
// borrarSeleccionados() is implemented per-page

// ─── Modal backdrop: click outside to close ─────────────────────────────────
document.addEventListener('click', function(e) {
    // Click on backdrop (the overlay itself) → close
    if (e.target.classList.contains('modal-overlay') && !e.target.classList.contains('hidden')) {
        resetIframePreviewState(e.target.id);
        e.target.classList.add('hidden');
        return;
    }
    // Click on element with data-modal-close="<modalId>" → close that modal
    var closer = e.target.closest('[data-modal-close]');
    if (closer) {
        var id = closer.getAttribute('data-modal-close');
        var m = document.getElementById(id);
        resetIframePreviewState(id);
        if (m) m.classList.add('hidden');
    }
});
</script>

<!-- Notification system (27.5) -->
<script>
(function() {
    function normalizeCount(payload) {
        if (typeof payload === 'number') return payload;
        if (payload && typeof payload.count === 'number') return payload.count;
        return 0;
    }

    function updateMarkAllButton(count) {
        var button = document.getElementById('notifMarkAllBtn');
        if (!button) return;
        var hasUnread = count > 0;
        var label = hasUnread
            ? ('Marcar ' + count + (count === 1 ? ' notificacion como leida' : ' notificaciones como leidas'))
            : 'No hay notificaciones sin leer';
        button.disabled = !hasUnread;
        button.title = label;
        button.setAttribute('aria-label', label);
    }

    function loadNotifCount() {
        fetch('/api/notificaciones/no-leidas', { credentials: 'same-origin' })
            .then(function(r) { if(!r.ok) throw r; return r.json(); })
            .then(function(payload) {
                var count = normalizeCount(payload);
                var badge = document.getElementById('notifBadge');
                if (badge) {
                    if (count > 0) {
                        badge.textContent = count > 99 ? '99+' : count;
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }
                }
                updateMarkAllButton(count);
            }).catch(function() {});
    }

    function loadNotifList() {
        fetch('/api/notificaciones', { credentials: 'same-origin' })
            .then(function(r) { return r.json(); })
            .then(function(list) {
                var container = document.getElementById('notifList');
                if (!container) return;
                if (!list.length) {
                    container.innerHTML = '<p class="text-center text-sm text-slate-400 py-6">Sin notificaciones</p>';
                    return;
                }
                container.innerHTML = list.slice(0, 20).map(function(n) {
                    var read = n.leida ? 'bg-white' : 'bg-blue-50';
                    var fecha = n.fecha ? new Date(n.fecha).toLocaleDateString('es-ES') : '';
                    return '<div class="px-4 py-3 ' + read + ' hover:bg-slate-50 cursor-pointer" data-notif-id="' + n.id + '" data-notif-enlace="' + escAttr(n.enlace || '') + '" onclick="markReadFromElement(this, event)">'
                        + '<p class="text-sm font-medium text-slate-800">' + esc(n.titulo) + '</p>'
                        + '<p class="text-xs text-slate-500 mt-0.5">' + esc(n.mensaje) + '</p>'
                        + '<p class="text-[10px] text-slate-400 mt-1">' + fecha + '</p>'
                        + '</div>';
                }).join('');
            }).catch(function() {});
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escAttr(s) {
        return String(s || '')
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    window.toggleNotifPanel = function() {
        var panel = document.getElementById('notifPanel');
        if (!panel) return;
        var showing = !panel.classList.contains('hidden');
        panel.classList.toggle('hidden');
        if (!showing) {
            loadNotifCount();
            loadNotifList();
        }
    };

    window.markRead = function(event, id, enlace) {
        if (event) {
            event.preventDefault();
            event.stopPropagation();
        }
        fetch('/api/notificaciones/' + id + '/leer', { method: 'PATCH', credentials: 'same-origin' })
            .then(function() {
                loadNotifCount();
                loadNotifList();
                if (enlace) window.location.href = enlace;
            }).catch(function() {});
    };

    window.markReadFromElement = function(element, event) {
        if (!element) return;
        var id = element.getAttribute('data-notif-id');
        var enlace = element.getAttribute('data-notif-enlace') || '';
        window.markRead(event, id, enlace);
    };

    window.markAllRead = function(event) {
        if (event) {
            event.preventDefault();
            event.stopPropagation();
        }
        fetch('/api/notificaciones/leer-todas', { method: 'PATCH', credentials: 'same-origin' })
            .then(function(r) {
                if (!r.ok) throw r;
                loadNotifCount();
                loadNotifList();
            }).catch(function() {});
    };

    // Close panel on outside click
    document.addEventListener('click', function(e) {
        var bell = document.getElementById('notifBell');
        var panel = document.getElementById('notifPanel');
        if (bell && panel && !bell.contains(e.target)) panel.classList.add('hidden');
    });

    // Poll every 30s
    loadNotifCount();
    setInterval(loadNotifCount, 30000);
})();
</script>

</body>
</html>
