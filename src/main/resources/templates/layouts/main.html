<!DOCTYPE html>
<html lang="es"
      th:fragment="layout(pageId, pageTitle, pageHeading, pageContent, pageScripts)"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">EcoAdmin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .nav-group-body { max-height: 500px; overflow: hidden; transition: max-height 0.25s ease; }
        /* Evita scroll horizontal a nivel de pagina; las tablas tienen su propio overflow-x-auto */
        html, body { overflow-x: clip; }
        /* Empty state hint para columnas Kanban vacias (CSS puro, no hijo del Sortable) */
        .kanban-col:empty::before { content: 'Sin traslados'; display: block; text-align: center; color: #cbd5e1; font-size: 0.75rem; padding: 1rem 0; pointer-events: none; }
        .nav-group-body.nav-collapsed { max-height: 0 !important; }
        /* Controles de formulario unificados */
        .form-control-eco {
            width: 100%;
            padding: 0.4rem 0.75rem;
            font-size: 0.875rem;
            line-height: 1.5;
            color: #1e293b;
            background-color: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 0.625rem;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            appearance: none;
            -webkit-appearance: none;
        }
        .form-control-eco:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .form-control-eco:disabled { background-color: #f8fafc; color: #94a3b8; cursor: not-allowed; }
        select.form-control-eco {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
            background-size: 1.25rem;
            padding-right: 2rem;
        }
        textarea.form-control-eco { resize: vertical; min-height: 64px; }
        /* Modal animation */
        .modal-eco { transition: opacity 0.18s ease, transform 0.18s ease; }

        /* ─── Dark mode ──────────────────────────────────────────────── */
        body.dark-mode { background-color: #0f172a !important; color: #e2e8f0; }
        body.dark-mode .bg-white { background-color: #1e293b !important; }
        body.dark-mode .bg-\[\#f1f5f9\] { background-color: #0f172a !important; }
        body.dark-mode header { background-color: #1e293b !important; border-color: #334155 !important; }
        body.dark-mode .text-slate-800 { color: #f1f5f9 !important; }
        body.dark-mode .text-slate-700 { color: #cbd5e1 !important; }
        body.dark-mode .text-slate-600 { color: #94a3b8 !important; }
        body.dark-mode .text-slate-500 { color: #64748b !important; }
        body.dark-mode .border-slate-200 { border-color: #334155 !important; }
        body.dark-mode .border-slate-100 { border-color: #1e293b !important; }
        body.dark-mode .shadow-sm { box-shadow: 0 1px 2px rgba(0,0,0,0.4) !important; }
        body.dark-mode table thead tr { background-color: #0f172a !important; }
        body.dark-mode table tbody tr:hover { background-color: #1e293b !important; }
        body.dark-mode table tbody tr { border-color: #334155 !important; }
        body.dark-mode .form-control-eco { background-color: #1e293b !important; border-color: #475569 !important; color: #f1f5f9 !important; }
        body.dark-mode .form-control-eco:focus { border-color: #3b82f6 !important; }
        body.dark-mode .bg-slate-50 { background-color: #1e293b !important; }
        body.dark-mode .bg-slate-100 { background-color: #0f172a !important; }
        body.dark-mode .hover\:bg-slate-100:hover { background-color: #1e293b !important; }
        body.dark-mode .hover\:bg-slate-50:hover { background-color: #1e293b !important; }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea {
            background-color: #1e293b !important; border-color: #475569 !important; color: #f1f5f9 !important;
        }
        body.dark-mode .badge { border-color: #475569; }
        body.dark-mode [class*="bg-blue-50"] { background-color: rgba(59,130,246,0.15) !important; }
        body.dark-mode [class*="bg-green-50"] { background-color: rgba(34,197,94,0.15) !important; }
        body.dark-mode [class*="bg-red-50"] { background-color: rgba(239,68,68,0.15) !important; }
        body.dark-mode [class*="bg-yellow-50"] { background-color: rgba(234,179,8,0.15) !important; }
        body.dark-mode .kanban-col { background-color: #1e293b !important; border-color: #334155 !important; }
        body.dark-mode .kanban-card { background-color: #0f172a !important; border-color: #334155 !important; }
        /* Rounded panels / cards */
        body.dark-mode .rounded-2xl.bg-white,
        body.dark-mode .rounded-xl.bg-white,
        body.dark-mode .rounded-lg.bg-white { background-color: #1e293b !important; }
    </style>
</head>
<body class="bg-[#f1f5f9] min-h-screen" data-theme="light">

<!-- SIDEBAR -->
<aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-[260px] bg-[#1e2a3b] flex flex-col -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">

    <!-- Logo -->
    <div class="flex items-center gap-3 px-6 py-5 border-b border-white/10 shrink-0">
        <div class="w-9 h-9 rounded-xl bg-[#3b82f6] flex items-center justify-center text-white shadow-lg">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
        </div>
        <span class="font-bold text-white text-[15px]">EcoAdmin</span>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto py-3 px-3 space-y-0.5">

        <!-- PRINCIPAL group -->
        <button onclick="toggleNavGroup('grp-principal')"
                class="w-full flex items-center justify-between px-3 py-1.5 text-[10px] font-semibold text-slate-500 uppercase tracking-widest hover:text-slate-400 transition-colors">
            <span>Inicio</span>
            <svg id="grp-principal-ic" class="w-3 h-3 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="grp-principal" class="nav-group-body space-y-0.5 pl-1">
            <a th:href="@{/public/index}"
               th:class="${pageId == 'index'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                Dashboard
            </a>
            <a th:href="@{/public/traslados}"
               th:class="${pageId == 'traslados'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                Recogidas
            </a>
            <a th:href="@{/public/rutas}"
               th:class="${pageId == 'rutas'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
                Rutas
            </a>
        </div>

        <!-- ALMACÉN -->
        <a th:href="@{/public/residuos}"
           th:class="${pageId == 'residuos'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all mt-1' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all mt-1'">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/></svg>
            Residuos
        </a>

        <!-- CONTACTOS group -->
        <button onclick="toggleNavGroup('grp-contactos')"
                class="w-full flex items-center justify-between px-3 py-1.5 text-[10px] font-semibold text-slate-500 uppercase tracking-widest hover:text-slate-400 transition-colors mt-1">
            <span>Registros</span>
            <svg id="grp-contactos-ic" class="w-3 h-3 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="grp-contactos" class="nav-group-body space-y-0.5 pl-1">
            <a th:href="@{/public/centros}"
               th:class="${pageId == 'centros'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                Centros
            </a>
            <a th:href="@{/public/usuarios}"
               th:class="${pageId == 'usuarios'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-4-4h-1M9 20H4v-2a4 4 0 014-4h1m8-4a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                Usuarios
            </a>
            <a th:href="@{/public/direcciones}"
               th:class="${pageId == 'direcciones'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
                <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Direcciones
            </a>
        </div>

        <!-- NEGOCIO -->
        <a th:href="@{/public/negocio}"
           th:class="${pageId == 'negocio'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all mt-1' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all mt-1'">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            Negocio
        </a>

        <!-- MIS DATOS -->
        <a th:href="@{/public/mis-datos}"
           th:class="${pageId == 'mis-datos'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all'">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Mis Datos
        </a>

        <!-- DOCUMENTOS -->
        <a th:href="@{/public/documentos}"
           th:class="${pageId == 'documentos'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold bg-[#3b82f6] text-white shadow-md transition-all mt-1' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all mt-1'">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Documentos
        </a>

        <!-- INFORMES -->
        <a th:href="@{/public/index}" title="Ver estadísticas en el dashboard"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/10 hover:text-white transition-all">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Informes
        </a>

    </nav>

    <!-- User footer -->
    <div class="shrink-0 border-t border-white/10 p-4">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-[#3b82f6] flex items-center justify-center text-white text-xs font-bold shrink-0">A</div>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-white truncate" sec:authentication="name">Admin</p>
                <p class="text-[11px] text-slate-400">Administrador</p>
            </div>
            <button id="darkToggle" type="button" title="Modo oscuro"
                    onclick="toggleDarkMode()"
                    class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:bg-white/10 hover:text-white transition-all">
                <svg id="darkIcon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
            </button>
            <form th:action="@{/logout}" method="post" class="shrink-0 m-0 p-0">
                <button type="submit" title="Cerrar sesion"
                        class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:bg-red-500/20 hover:text-red-400 transition-all">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</aside>

<div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 lg:hidden hidden" onclick="closeSidebar()"></div>

<!-- MAIN WRAPPER -->
<div class="lg:ml-[260px] min-h-screen flex flex-col">

    <!-- Top header -->
    <header class="sticky top-0 z-30 bg-white border-b border-slate-200 flex items-center h-16 px-4 sm:px-6 gap-4 shrink-0 shadow-sm">
        <button type="button" onclick="openSidebar()" class="lg:hidden p-2 rounded-lg text-slate-500 hover:bg-slate-100 transition">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
        <div class="flex items-center gap-2 text-sm text-slate-500">
            <span class="font-semibold text-slate-800" th:text="${pageHeading}">EcoAdmin</span>
        </div>
        <div class="flex-1"></div>
        <div class="flex items-center gap-2.5 pl-4 border-l border-slate-200">
            <div class="w-8 h-8 rounded-full bg-[#3b82f6] flex items-center justify-center text-white text-xs font-bold">A</div>
            <span class="hidden sm:block text-sm font-medium text-slate-700" sec:authentication="name">Admin</span>
        </div>
    </header>

    <!-- Page content -->
    <th:block th:replace="${pageContent}"></th:block>
</div>

<!-- BATCH ACTION BAR (shared, controlled per page via actualizarBatchBar()) -->
<div id="batchBar"
     class="hidden fixed bottom-0 left-0 right-0 z-50 flex items-center justify-between px-6 py-3 bg-slate-900 text-white shadow-2xl"
     style="transition: transform 0.2s ease; transform: translateY(100%);">
    <span class="text-sm font-medium"><span id="batchCount">0</span> seleccionados</span>
    <div class="flex items-center gap-3">
        <button onclick="limpiarSeleccion()"
                class="btn btn-sm btn-ghost text-slate-300 hover:text-white normal-case">Cancelar</button>
        <button id="batchDeleteBtn" onclick="borrarSeleccionados()"
                class="btn btn-sm bg-red-500 hover:bg-red-600 text-white border-none normal-case">
            <svg class="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            Eliminar seleccionados
        </button>
    </div>
</div>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>

<script>// ─── Dark mode ───────────────────────────────────────────────────────────────
(function() {
    if (localStorage.getItem('darkMode') === '1') {
        document.documentElement.classList.add('dark-mode');
        document.body.classList.add('dark-mode');
    }
})();
function toggleDarkMode() {
    var isDark = document.body.classList.toggle('dark-mode');
    document.documentElement.classList.toggle('dark-mode', isDark);
    localStorage.setItem('darkMode', isDark ? '1' : '0');
    var icon = document.getElementById('darkIcon');
    if (icon) {
        icon.innerHTML = isDark
            ? '<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>'
            : '<path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>';
    }
}
document.addEventListener('DOMContentLoaded', function() {
    var isDark = localStorage.getItem('darkMode') === '1';
    document.body.classList.toggle('dark-mode', isDark);
    var icon = document.getElementById('darkIcon');
    if (icon && isDark) {
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>';
    }
});
// ─── Sidebar ────────────────────────────────────────────────────────────────
function openSidebar() {
    document.getElementById('sidebar').classList.remove('-translate-x-full');
    document.getElementById('sidebarOverlay').classList.remove('hidden');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.add('-translate-x-full');
    document.getElementById('sidebarOverlay').classList.add('hidden');
}

// ─── Collapsible nav groups ──────────────────────────────────────────────────
function toggleNavGroup(id) {
    var el = document.getElementById(id);
    var ic = document.getElementById(id + '-ic');
    var isCollapsed = el.classList.toggle('nav-collapsed');
    if (ic) ic.style.transform = isCollapsed ? 'rotate(-90deg)' : '';
    localStorage.setItem('nav-' + id, isCollapsed ? '1' : '0');
}
document.addEventListener('DOMContentLoaded', function() {
    ['grp-principal', 'grp-contactos'].forEach(function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        var ic = document.getElementById(id + '-ic');
        if (localStorage.getItem('nav-' + id) === '1') {
            el.classList.add('nav-collapsed');
            if (ic) ic.style.transform = 'rotate(-90deg)';
        }
    });
});

// ─── XSS helper ─────────────────────────────────────────────────────────────
function esc(s) {
    if (s == null) return '';
    var d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
}

// ─── Batch actions (shared utilities) ───────────────────────────────────────
function getSeleccionados() {
    return Array.from(document.querySelectorAll('.batch-check:checked')).map(function(cb) { return cb.value; });
}
function actualizarBatchBar() {
    var ids = getSeleccionados();
    var bar = document.getElementById('batchBar');
    if (ids.length > 0) {
        bar.classList.remove('hidden');
        requestAnimationFrame(function() { bar.style.transform = 'translateY(0)'; });
        document.getElementById('batchCount').textContent = ids.length;
    } else {
        bar.style.transform = 'translateY(100%)';
        setTimeout(function() {
            if (getSeleccionados().length === 0) bar.classList.add('hidden');
        }, 210);
    }
}
function seleccionarTodos(cb) {
    document.querySelectorAll('.batch-check').forEach(function(c) { c.checked = cb.checked; });
    actualizarBatchBar();
}
function limpiarSeleccion() {
    document.querySelectorAll('.batch-check, #selAll').forEach(function(c) { c.checked = false; });
    actualizarBatchBar();
}
// borrarSeleccionados() is implemented per-page
</script>

<!-- Page-specific scripts -->
<th:block th:replace="${pageScripts}"></th:block>

</body>
