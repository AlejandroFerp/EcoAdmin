<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('direcciones', 'EcoAdmin — Direcciones', 'Gestion de direcciones', ~{::pageContent}, ~{::pageScripts})}">
<body>

<th:block th:fragment="pageContent">
<main class="flex-1 p-4 sm:p-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h2 class="text-xl font-bold text-slate-900">Direcciones</h2>
            <p class="text-sm text-slate-500 mt-0.5">Gestion de ubicaciones</p>
        </div>
        <button type="button" onclick="abrirCrear()"
                class="btn bg-[#3b82f6] hover:bg-[#2563eb] text-white border-none normal-case shrink-0 shadow-md">
            + Anadir Direccion
        </button>
    </div>
    <div th:replace="~{layouts/fragments :: searchBar('Buscar direcciones...')}"></div>
    <!-- Mapa general de direcciones -->
    <div class="mb-4">
        <button type="button" onclick="toggleMapaGeneral()" class="flex items-center gap-2 text-sm font-medium text-slate-600 hover:text-blue-600 transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
            <span id="mapaGeneralLabel">Mostrar mapa</span>
        </button>
        <div id="mapaGeneralWrap" class="hidden mt-2">
            <div id="mapaGeneral" style="height:350px" class="rounded-xl overflow-hidden border border-slate-200 shadow-sm w-full"></div>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-x-auto">
        <table class="table table-zebra table-sm w-full">
            <thead>
                <tr class="text-xs uppercase text-slate-400 border-b border-slate-100">
                    <th class="w-10 pr-0"><input type="checkbox" class="checkbox checkbox-xs" id="selAll" onclick="seleccionarTodos(this)"></th>
                    <th class="w-12">ID</th>
                    <th>Nombre</th>
                    <th>Calle</th>
                    <th>Ciudad</th>
                    <th class="hidden md:table-cell">CP</th>
                    <th class="hidden md:table-cell">Provincia</th>
                    <th class="hidden lg:table-cell">Coords</th>
                    <th class="text-right">Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo">
                <tr><td colspan="9" class="text-center py-12 text-slate-400">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
    <div th:replace="~{layouts/fragments :: paginationBar}"></div>
</main>

<!-- MODAL FORM -->
<div id="modalForm" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
    <div class="relative p-4 w-full max-w-lg">
        <div class="relative bg-white rounded-2xl shadow-xl">
            <div class="flex items-center justify-between p-5 border-b border-slate-100">
                <h3 id="modalTitulo" class="text-base font-semibold text-slate-900">Crear Direccion</h3>
                <button th:replace="~{layouts/fragments :: modalCloseBtn('modalForm')}"></button>
            </div>
            <div class="p-5 grid grid-cols-2 gap-4">
                <input type="hidden" id="itemId">
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nombre</label>
                    <input type="text" id="fNombre" class="form-control-eco" placeholder="Nombre identificativo">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Calle *</label>
                    <input type="text" id="fCalle" class="form-control-eco" placeholder="Calle y numero">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Ciudad</label>
                    <input type="text" id="fCiudad" class="form-control-eco" placeholder="Ciudad">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Codigo Postal</label>
                    <input type="text" id="fCP" class="form-control-eco" placeholder="00000">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Provincia</label>
                    <input type="text" id="fProvincia" class="form-control-eco" placeholder="Provincia">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Pais</label>
                    <input type="text" id="fPais" class="form-control-eco" value="Espana" placeholder="Espana">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Latitud</label>
                    <input type="number" step="any" id="fLat" class="form-control-eco" placeholder="38.3452" oninput="sincronizarMapaForm()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Longitud</label>
                    <input type="number" step="any" id="fLon" class="form-control-eco" placeholder="-0.4815" oninput="sincronizarMapaForm()">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">
                        Ubicacion en el mapa
                        <span class="text-xs text-slate-400 font-normal ml-1">Haz clic para establecer coordenadas</span>
                    </label>
                    <div id="mapaForm" style="height:240px" class="rounded-xl overflow-hidden border border-slate-200 w-full"></div>
                </div>
            </div>
            <div th:replace="~{layouts/fragments :: modalFooter('modalForm', 'Guardar', 'guardar')}"></div>
        </div>
    </div>
</div>
</th:block>

<th:block th:fragment="pageScripts">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WPcM=" crossorigin=""></script>
<script>
var todos = [], pagina = 1, filtro = '';
var POR_PAGINA = 15;
var mForm;
var mapaFormInstance = null, mapaFormMarker = null;
var mapaGeneralInstance = null, mapaGeneralVisible = false;

function initModales() {
    var el = document.getElementById('modalForm');
    if (el && typeof Modal !== 'undefined') {
        mForm = new Modal(el, { backdrop:'dynamic', closable:true });
    }
}

document.addEventListener('DOMContentLoaded', function() { initModales(); cargar(); });

async function cargar() {
    try {
        var res = await fetch('/api/direcciones');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        todos = await res.json();
    } catch (err) {
        document.getElementById('tablaCuerpo').innerHTML =
            '<tr><td colspan="9" class="text-center py-12 text-red-400">Error al cargar datos. Recarga la p\u00e1gina.</td></tr>';
        return;
    }
    pagina = 1;
    renderTabla();
}

function filtrar() { filtro = document.getElementById('busqueda').value.toLowerCase(); pagina = 1; renderTabla(); }

function renderTabla() {
    var lista = todos.filter(function(d) {
        return (d.nombre || '').toLowerCase().includes(filtro) ||
               (d.calle || '').toLowerCase().includes(filtro) ||
               (d.ciudad || '').toLowerCase().includes(filtro) ||
               (d.provincia || '').toLowerCase().includes(filtro);
    });
    var inicio = (pagina - 1) * POR_PAGINA;
    var slice = lista.slice(inicio, inicio + POR_PAGINA);
    var total = lista.length;
    var totalPags = Math.max(1, Math.ceil(total / POR_PAGINA));

    document.getElementById('infoReg').textContent = total === 0
        ? 'Sin registros'
        : 'Mostrando ' + (inicio + 1) + '\u2013' + Math.min(inicio + POR_PAGINA, total) + ' de ' + total;

    document.getElementById('tablaCuerpo').innerHTML = slice.length === 0
        ? '<tr><td colspan="8" class="text-center py-12 text-slate-400">Sin resultados</td></tr>'
        : slice.map(function(d) {
            var coords = (d.latitud && d.longitud) ? d.latitud.toFixed(4) + ', ' + d.longitud.toFixed(4) : '\u2014';
            return '<tr class="hover" ondblclick="abrirEditar(' + d.id + ')">'
                + '<td class="w-10 pr-0"><input type="checkbox" class="checkbox checkbox-xs batch-check" value="' + d.id + '" onchange="actualizarBatchBar()" onclick="event.stopPropagation()"></td>'
                + '<td class="text-xs text-slate-400">' + d.id + '</td>'
                + '<td class="font-medium">' + esc(d.nombre || '\u2014') + '</td>'
                + '<td class="text-sm">' + esc(d.calle || '\u2014') + '</td>'
                + '<td class="text-sm">' + esc(d.ciudad || '\u2014') + '</td>'
                + '<td class="text-sm text-slate-500 hidden md:table-cell">' + esc(d.codigoPostal || '\u2014') + '</td>'
                + '<td class="text-sm text-slate-500 hidden md:table-cell">' + esc(d.provincia || '\u2014') + '</td>'
                + '<td class="text-xs text-slate-400 hidden lg:table-cell">' + coords + '</td>'
                + '<td class="text-right whitespace-nowrap">'
                + '  <button class="btn btn-ghost btn-xs tooltip" data-tip="Editar" onclick="abrirEditar(' + d.id + ')"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>'
                + '  <button class="btn btn-ghost btn-xs text-red-500 tooltip" data-tip="Eliminar" onclick="pedirBorrar(' + d.id + ')"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg></button>'
                + '</td></tr>';
        }).join('');

    document.getElementById('pgBotones').innerHTML = Array.from({ length: totalPags }, function(_, i) { return i + 1; })
        .map(function(i) { return '<button class="join-item btn btn-xs ' + (i === pagina ? 'bg-[#3b82f6] text-white border-none' : '') + '" onclick="irPagina(' + i + ')">' + i + '</button>'; }).join('');
}

function irPagina(n) { pagina = n; renderTabla(); }

function abrirCrear() {
    document.getElementById('modalTitulo').textContent = 'Crear Direccion';
    document.getElementById('itemId').value = '';
    ['fNombre','fCalle','fCiudad','fCP','fProvincia','fLat','fLon'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('fPais').value = 'Espana';
    mForm && mForm.show();
    setTimeout(function() { initMapaForm(null, null); }, 250);
}

async function abrirEditar(id) {
    var d = await fetch('/api/direcciones/' + id).then(function(r) { return r.json(); });
    document.getElementById('modalTitulo').textContent = 'Editar Direccion';
    document.getElementById('itemId').value = d.id;
    document.getElementById('fNombre').value = d.nombre || '';
    document.getElementById('fCalle').value = d.calle || '';
    document.getElementById('fCiudad').value = d.ciudad || '';
    document.getElementById('fCP').value = d.codigoPostal || '';
    document.getElementById('fProvincia').value = d.provincia || '';
    document.getElementById('fPais').value = d.pais || '';
    document.getElementById('fLat').value = d.latitud || '';
    document.getElementById('fLon').value = d.longitud || '';
    mForm && mForm.show();
    setTimeout(function() { initMapaForm(d.latitud, d.longitud); }, 250);
}

async function guardar() {
    var id = document.getElementById('itemId').value;
    var body = {
        nombre: document.getElementById('fNombre').value.trim(),
        calle: document.getElementById('fCalle').value.trim(),
        ciudad: document.getElementById('fCiudad').value.trim(),
        codigoPostal: document.getElementById('fCP').value.trim(),
        provincia: document.getElementById('fProvincia').value.trim(),
        pais: document.getElementById('fPais').value.trim(),
        latitud: parseFloat(document.getElementById('fLat').value) || null,
        longitud: parseFloat(document.getElementById('fLon').value) || null
    };
    if (!body.calle) { Swal.fire({ icon:'warning', text:'La calle es obligatoria.' }); return; }
    var res = await fetch(id ? '/api/direcciones/' + id : '/api/direcciones', {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (res.ok) { mForm && mForm.hide(); await cargar(); }
    else { Swal.fire({ icon:'error', title:'Error', text:'No se pudo guardar.' }); }
}

async function pedirBorrar(id) {
    var result = await Swal.fire({
        title: 'Eliminar direccion?',
        text: 'Esta accion no se puede deshacer.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonText: 'Cancelar',
        confirmButtonText: 'Eliminar'
    });
    if (!result.isConfirmed) return;
    var res = await fetch('/api/direcciones/' + id, { method: 'DELETE' });
    if (res.ok || res.status === 204) { await cargar(); }
    else {
        var data = await res.json().catch(function() { return {}; });
        Swal.fire({ icon:'error', title:'No se puede eliminar', text: data.error || 'Error al eliminar.' });
    }
}
async function borrarSeleccionados() {
    var ids = getSeleccionados();
    if (!ids.length) return;
    var result = await Swal.fire({
        title: 'Eliminar ' + ids.length + ' dirección(es)?',
        text: 'Solo se eliminan direcciones sin centros asociados.',
        icon: 'warning', showCancelButton: true,
        confirmButtonColor: '#ef4444', cancelButtonText: 'Cancelar', confirmButtonText: 'Eliminar'
    });
    if (!result.isConfirmed) return;
    var errors = [];
    for (var id of ids) {
        var res = await fetch('/api/direcciones/' + id, { method: 'DELETE' });
        if (!res.ok && res.status !== 204) {
            var d = await res.json().catch(function(){ return {}; });
            errors.push((d.error || 'Error') + ' (ID ' + id + ')');
        }
    }
    limpiarSeleccion();
    await cargar();
    if (errors.length) Swal.fire({ icon: 'warning', title: 'Algunas no se pudieron eliminar', text: errors.join('\n') });
}

/* ── Leaflet: mapa en modal ── */
function initMapaForm(lat, lon) {
    var defaultLat = lat || 38.3452, defaultLon = lon || -0.4815;
    var el = document.getElementById('mapaForm');
    if (!el) return;
    if (mapaFormInstance) {
        mapaFormInstance.remove();
        mapaFormInstance = null;
        mapaFormMarker = null;
    }
    mapaFormInstance = L.map('mapaForm').setView([defaultLat, defaultLon], lat ? 14 : 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(mapaFormInstance);
    if (lat && lon) {
        mapaFormMarker = L.marker([lat, lon]).addTo(mapaFormInstance);
    }
    mapaFormInstance.on('click', function(e) {
        var ll = e.latlng;
        document.getElementById('fLat').value = ll.lat.toFixed(6);
        document.getElementById('fLon').value = ll.lng.toFixed(6);
        if (mapaFormMarker) {
            mapaFormMarker.setLatLng(ll);
        } else {
            mapaFormMarker = L.marker(ll).addTo(mapaFormInstance);
        }
        geocodificarInverso(ll.lat, ll.lng);
    });
}

function sincronizarMapaForm() {
    var lat = parseFloat(document.getElementById('fLat').value);
    var lon = parseFloat(document.getElementById('fLon').value);
    if (!isNaN(lat) && !isNaN(lon) && mapaFormInstance) {
        mapaFormInstance.setView([lat, lon], 14);
        if (mapaFormMarker) {
            mapaFormMarker.setLatLng([lat, lon]);
        } else {
            mapaFormMarker = L.marker([lat, lon]).addTo(mapaFormInstance);
        }
    }
}

async function geocodificarInverso(lat, lon) {
    try {
        var url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lon + '&accept-language=es';
        var r = await fetch(url, { headers: { 'Accept': 'application/json' } });
        if (!r.ok) return;
        var data = await r.json();
        var addr = data.address || {};
        if (!document.getElementById('fCiudad').value && (addr.city || addr.town || addr.village || addr.municipality)) {
            document.getElementById('fCiudad').value = addr.city || addr.town || addr.village || addr.municipality || '';
        }
        if (!document.getElementById('fProvincia').value && (addr.province || addr.state)) {
            document.getElementById('fProvincia').value = addr.province || addr.state || '';
        }
        if (!document.getElementById('fCP').value && addr.postcode) {
            document.getElementById('fCP').value = addr.postcode;
        }
        if (!document.getElementById('fCalle').value && addr.road) {
            var numero = addr.house_number ? ' ' + addr.house_number : '';
            document.getElementById('fCalle').value = (addr.road + numero).trim();
        }
        if (!document.getElementById('fPais').value && addr.country) {
            document.getElementById('fPais').value = addr.country;
        }
    } catch(e) { /* geocode no critico */ }
}

/* ── Leaflet: mapa general (overview) ── */
function toggleMapaGeneral() {
    mapaGeneralVisible = !mapaGeneralVisible;
    var wrap = document.getElementById('mapaGeneralWrap');
    var label = document.getElementById('mapaGeneralLabel');
    if (mapaGeneralVisible) {
        wrap.classList.remove('hidden');
        label.textContent = 'Ocultar mapa';
        setTimeout(function() { renderMapaGeneral(); }, 150);
    } else {
        wrap.classList.add('hidden');
        label.textContent = 'Mostrar mapa';
        if (mapaGeneralInstance) { mapaGeneralInstance.remove(); mapaGeneralInstance = null; }
    }
}

function renderMapaGeneral() {
    if (mapaGeneralInstance) { mapaGeneralInstance.remove(); mapaGeneralInstance = null; }
    var el = document.getElementById('mapaGeneral');
    if (!el) return;
    var conCoords = todos.filter(function(d) { return d.latitud && d.longitud; });
    var centerLat = 38.3452, centerLon = -0.4815, zoom = 6;
    if (conCoords.length > 0) {
        centerLat = conCoords.reduce(function(s, d) { return s + d.latitud; }, 0) / conCoords.length;
        centerLon = conCoords.reduce(function(s, d) { return s + d.longitud; }, 0) / conCoords.length;
        zoom = conCoords.length === 1 ? 13 : 7;
    }
    mapaGeneralInstance = L.map('mapaGeneral').setView([centerLat, centerLon], zoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(mapaGeneralInstance);
    conCoords.forEach(function(d) {
        var marker = L.marker([d.latitud, d.longitud]).addTo(mapaGeneralInstance);
        var popup = '<strong>' + esc(d.nombre || 'Sin nombre') + '</strong>'
            + '<br><span class="text-sm">' + esc(d.calle || '') + '</span>'
            + '<br><button onclick="abrirEditar(' + d.id + ')" style="color:#3b82f6;font-size:12px;cursor:pointer">Editar</button>';
        marker.bindPopup(popup);
    });
    if (conCoords.length === 0) {
        L.popup().setLatLng([centerLat, centerLon]).setContent('Sin direcciones con coordenadas').openOn(mapaGeneralInstance);
    }
}
</script>
</th:block>
</body>
</html>
