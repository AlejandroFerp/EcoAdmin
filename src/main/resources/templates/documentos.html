<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('documentos', 'EcoAdmin - Documentos', 'Documentos', ~{::pageContent}, ~{::pageScripts})}">
<body>

<th:block th:fragment="pageContent">
<main class="flex-1 p-4 sm:p-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h2 class="text-xl font-bold text-slate-900">Documentos</h2>
            <p class="text-sm text-slate-500 mt-0.5">Documentos de identificacion y gestion documental</p>
        </div>
        <button type="button" onclick="abrirCrear()"
                class="btn bg-[#3b82f6] hover:bg-[#2563eb] text-white border-none normal-case shrink-0 shadow-md">
            + Nuevo Documento
        </button>
    </div>

    <!-- Filtros rapidos por tipo -->
    <div class="flex flex-wrap gap-2 mb-4">
        <button onclick="filtrarTipo('')" id="ftodos"
                class="tipo-btn active px-3 py-1.5 rounded-full text-xs font-semibold border transition-all bg-[#3b82f6] text-white border-[#3b82f6]">
            Todos
        </button>
        <button onclick="filtrarTipo('DOCUMENTO_IDENTIFICACION')" id="fdi"
                class="tipo-btn px-3 py-1.5 rounded-full text-xs font-semibold border transition-all bg-white text-slate-600 border-slate-200 hover:border-[#3b82f6] hover:text-[#3b82f6]">
            D.I.
        </button>
        <button onclick="filtrarTipo('CONTRATO')" id="fcontrato"
                class="tipo-btn px-3 py-1.5 rounded-full text-xs font-semibold border transition-all bg-white text-slate-600 border-slate-200 hover:border-[#3b82f6] hover:text-[#3b82f6]">
            Contratos
        </button>
        <button onclick="filtrarTipo('NOTIFICACION_PREVIA')" id="fnp"
                class="tipo-btn px-3 py-1.5 rounded-full text-xs font-semibold border transition-all bg-white text-slate-600 border-slate-200 hover:border-[#3b82f6] hover:text-[#3b82f6]">
            Notificaciones
        </button>
        <button onclick="filtrarTipo('INFORME_FINAL')" id="finforme"
                class="tipo-btn px-3 py-1.5 rounded-full text-xs font-semibold border transition-all bg-white text-slate-600 border-slate-200 hover:border-[#3b82f6] hover:text-[#3b82f6]">
            Informes
        </button>
    </div>

    <div th:replace="~{layouts/fragments :: searchBar('Buscar por referencia, tipo...')}"></div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-100">
        <table class="table table-zebra table-sm w-full">
            <thead>
                <tr class="text-xs uppercase text-slate-400 border-b border-slate-100">
                    <th class="w-12">ID</th>
                    <th>Referencia</th>
                    <th>Tipo</th>
                    <th>Estado</th>
                    <th class="hidden md:table-cell">Traslado</th>
                    <th class="hidden lg:table-cell">Fecha emision</th>
                    <th class="hidden lg:table-cell">Vencimiento</th>
                    <th class="text-right">Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo">
                <tr><td colspan="8" class="text-center py-12 text-slate-400">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
    <div th:replace="~{layouts/fragments :: paginationBar}"></div>
</main>

<!-- MODAL FORM -->
<div id="modalForm" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
    <div class="relative p-4 w-full max-w-lg">
        <div class="relative bg-white rounded-2xl shadow-xl">
            <div class="flex items-center justify-between p-5 border-b border-slate-100">
                <h3 id="modalTitulo" class="text-base font-semibold text-slate-900">Nuevo Documento</h3>
                <button th:replace="~{layouts/fragments :: modalCloseBtn('modalForm')}"></button>
            </div>
            <div class="p-5 grid grid-cols-2 gap-4">
                <input type="hidden" id="itemId">
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Tipo *</label>
                    <select id="fTipo" class="form-control-eco">
                        <option value="DOCUMENTO_IDENTIFICACION">Documento de Identificacion (DI)</option>
                        <option value="CONTRATO">Contrato</option>
                        <option value="NOTIFICACION_PREVIA">Notificacion Previa</option>
                        <option value="ARCHIVO_CRONOLOGICO">Archivo Cronologico</option>
                        <option value="FICHA_ACEPTACION">Ficha de Aceptacion</option>
                        <option value="HOJA_SEGUIMIENTO">Hoja de Seguimiento</option>
                        <option value="INFORME_FINAL">Informe Final</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Numero de referencia</label>
                    <input type="text" id="fReferencia" class="form-control-eco" placeholder="DI-2025-001">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Estado</label>
                    <select id="fEstado" class="form-control-eco">
                        <option value="BORRADOR">Borrador</option>
                        <option value="EMITIDO">Emitido</option>
                        <option value="CERRADO">Cerrado</option>
                        <option value="VENCIDO">Vencido</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Traslado ID</label>
                    <input type="number" id="fTrasladoId" class="form-control-eco" placeholder="(opcional)">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Fecha emision</label>
                    <input type="date" id="fFechaEmision" class="form-control-eco">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Fecha vencimiento</label>
                    <input type="date" id="fFechaVencimiento" class="form-control-eco">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Observaciones</label>
                    <textarea id="fObservaciones" class="form-control-eco h-20 resize-none" placeholder="Notas adicionales..."></textarea>
                </div>
            </div>
            <div th:replace="~{layouts/fragments :: modalFooter('modalForm', 'Guardar', 'guardar')}"></div>
        </div>
    </div>
</div>
</th:block>

<th:block th:fragment="pageScripts">
<script>
const API = '/api/documentos';
let todos = [], pagina = 1, filtroTexto = '', filtroTipo = '';
let mForm;
document.addEventListener('DOMContentLoaded', function() {
    var el = document.getElementById('modalForm');
    if (el && typeof Modal !== 'undefined') mForm = new Modal(el, { backdrop: 'dynamic', closable: true });
});

const TIPO_LABELS = {
    DOCUMENTO_IDENTIFICACION: 'D.I.',
    CONTRATO: 'Contrato',
    NOTIFICACION_PREVIA: 'N.P.',
    ARCHIVO_CRONOLOGICO: 'Archivo',
    FICHA_ACEPTACION: 'F. Aceptacion',
    HOJA_SEGUIMIENTO: 'H. Seguimiento',
    INFORME_FINAL: 'Informe'
};

const ESTADO_CLASES = {
    BORRADOR: 'badge-ghost',
    EMITIDO: 'badge-success',
    CERRADO: 'badge-neutral',
    VENCIDO: 'badge-error'
};

document.getElementById('searchInput')?.addEventListener('input', e => {
    filtroTexto = e.target.value.toLowerCase();
    pagina = 1;
    renderTabla();
});

async function cargar() {
    try {
        const r = await fetch(API);
        if (!r.ok) throw new Error(r.status);
        todos = await r.json();
        renderTabla();
    } catch {
        document.getElementById('tablaCuerpo').innerHTML =
            `<tr><td colspan="8" class="text-center py-12 text-red-400">Error al cargar documentos</td></tr>`;
    }
}

function filtrarTipo(tipo) {
    filtroTipo = tipo;
    pagina = 1;
    document.querySelectorAll('.tipo-btn').forEach(btn => {
        const activo = btn.getAttribute('onclick').includes(`'${tipo}'`);
        btn.className = activo
            ? 'tipo-btn active px-3 py-1.5 rounded-full text-xs font-semibold border transition-all bg-[#3b82f6] text-white border-[#3b82f6]'
            : 'tipo-btn px-3 py-1.5 rounded-full text-xs font-semibold border transition-all bg-white text-slate-600 border-slate-200 hover:border-[#3b82f6] hover:text-[#3b82f6]';
    });
    renderTabla();
}

function renderTabla() {
    const filtrados = todos.filter(d => {
        const matchTipo = !filtroTipo || d.tipo === filtroTipo;
        const matchTexto = !filtroTexto
            || (d.numeroReferencia || '').toLowerCase().includes(filtroTexto)
            || (d.tipo || '').toLowerCase().includes(filtroTexto)
            || (d.estado || '').toLowerCase().includes(filtroTexto);
        return matchTipo && matchTexto;
    });
    const POR_PAG = 10;
    const inicio = (pagina - 1) * POR_PAG;
    const pagina_items = filtrados.slice(inicio, inicio + POR_PAG);
    const tbody = document.getElementById('tablaCuerpo');

    if (pagina_items.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="text-center py-12 text-slate-400">Sin resultados</td></tr>`;
        actualizarPaginacion(0, 0, 0);
        return;
    }

    tbody.innerHTML = pagina_items.map(d => `
        <tr class="hover:bg-slate-50 transition-colors">
            <td class="font-mono text-xs text-slate-500">${d.id}</td>
            <td class="font-medium text-slate-800">${d.numeroReferencia || '<span class="text-slate-400">—</span>'}</td>
            <td><span class="badge badge-outline badge-sm text-xs">${TIPO_LABELS[d.tipo] || d.tipo}</span></td>
            <td><span class="badge badge-sm ${ESTADO_CLASES[d.estado] || 'badge-ghost'}">${d.estado}</span></td>
            <td class="hidden md:table-cell text-slate-600 text-sm">${d.traslado ? '#' + d.traslado.id : '<span class="text-slate-400">—</span>'}</td>
            <td class="hidden lg:table-cell text-slate-500 text-xs">${d.fechaEmision ? formatFecha(d.fechaEmision) : '—'}</td>
            <td class="hidden lg:table-cell text-slate-500 text-xs">${vencimientoBadge(d)}</td>
            <td class="text-right">
                <div class="flex items-center justify-end gap-1">
                    <button onclick="emitirPdf(${d.id})" title="Emitir PDF"
                            ${d.traslado ? '' : 'disabled'}
                            class="btn btn-ghost btn-xs text-slate-600 hover:text-emerald-600 p-1 disabled:opacity-30">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                    </button>
                    <button onclick="abrirEditar(${d.id})" title="Editar"
                            class="btn btn-ghost btn-xs text-slate-600 hover:text-[#3b82f6] p-1">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    </button>
                    <button onclick="eliminar(${d.id})" title="Eliminar"
                            class="btn btn-ghost btn-xs text-slate-400 hover:text-red-500 p-1">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                </div>
            </td>
        </tr>`).join('');

    actualizarPaginacion(filtrados.length, pagina, POR_PAG);
}

function formatFecha(arr) {
    if (!arr) return '—';
    if (Array.isArray(arr)) return `${arr[2].toString().padStart(2,'0')}/${arr[1].toString().padStart(2,'0')}/${arr[0]}`;
    return arr;
}

function vencimientoBadge(d) {
    if (!d.fechaVencimiento) return '—';
    const fecha = Array.isArray(d.fechaVencimiento)
        ? new Date(d.fechaVencimiento[0], d.fechaVencimiento[1] - 1, d.fechaVencimiento[2])
        : new Date(d.fechaVencimiento);
    const hoy = new Date();
    const dias = Math.floor((fecha - hoy) / 86400000);
    const fechaStr = formatFecha(d.fechaVencimiento);
    if (dias < 0) return `<span class="text-red-500 font-medium">${fechaStr} (vencido)</span>`;
    if (dias <= 30) return `<span class="text-amber-500 font-medium">${fechaStr} (${dias}d)</span>`;
    return fechaStr;
}

function actualizarPaginacion(total, pag, porPag) {
    const totalPags = Math.ceil(total / porPag) || 1;
    const inicio = total === 0 ? 0 : (pag - 1) * porPag + 1;
    const fin = Math.min(pag * porPag, total);
    const el = document.getElementById('paginacionInfo');
    if (el) el.textContent = total === 0 ? 'Sin resultados' : `Mostrando ${inicio}-${fin} de ${total}`;
    const prev = document.getElementById('btnPrev');
    const next = document.getElementById('btnNext');
    if (prev) prev.disabled = pag <= 1;
    if (next) next.disabled = pag >= totalPags;
}

function irPagina(delta) {
    pagina += delta;
    renderTabla();
}

function abrirCrear() {
    document.getElementById('itemId').value = '';
    document.getElementById('modalTitulo').textContent = 'Nuevo Documento';
    document.getElementById('fTipo').value = 'DOCUMENTO_IDENTIFICACION';
    document.getElementById('fReferencia').value = '';
    document.getElementById('fEstado').value = 'BORRADOR';
    document.getElementById('fTrasladoId').value = '';
    document.getElementById('fFechaEmision').value = '';
    document.getElementById('fFechaVencimiento').value = '';
    document.getElementById('fObservaciones').value = '';
    if (mForm) mForm.show(); else document.getElementById('modalForm').classList.remove('hidden');
}

async function abrirEditar(id) {
    const d = todos.find(x => x.id === id);
    if (!d) return;
    document.getElementById('itemId').value = d.id;
    document.getElementById('modalTitulo').textContent = 'Editar Documento';
    document.getElementById('fTipo').value = d.tipo;
    document.getElementById('fReferencia').value = d.numeroReferencia || '';
    document.getElementById('fEstado').value = d.estado;
    document.getElementById('fTrasladoId').value = d.traslado ? d.traslado.id : '';
    document.getElementById('fFechaEmision').value = fechaParaInput(d.fechaEmision);
    document.getElementById('fFechaVencimiento').value = fechaParaInput(d.fechaVencimiento);
    document.getElementById('fObservaciones').value = d.observaciones || '';
    if (mForm) mForm.show(); else document.getElementById('modalForm').classList.remove('hidden');
}

function fechaParaInput(arr) {
    if (!arr) return '';
    if (Array.isArray(arr)) return `${arr[0]}-${arr[1].toString().padStart(2,'0')}-${arr[2].toString().padStart(2,'0')}`;
    return arr;
}

async function guardar() {
    const id = document.getElementById('itemId').value;
    const trasladoIdVal = document.getElementById('fTrasladoId').value;
    const payload = {
        tipo: document.getElementById('fTipo').value,
        numeroReferencia: document.getElementById('fReferencia').value.trim(),
        estado: document.getElementById('fEstado').value,
        traslado: trasladoIdVal ? { id: parseInt(trasladoIdVal) } : null,
        fechaEmision: document.getElementById('fFechaEmision').value || null,
        fechaVencimiento: document.getElementById('fFechaVencimiento').value || null,
        observaciones: document.getElementById('fObservaciones').value.trim() || null
    };
    const url = id ? `${API}/${id}` : API;
    const method = id ? 'PUT' : 'POST';
    try {
        const r = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!r.ok) throw new Error(r.status);
        if (mForm) mForm.hide(); else document.getElementById('modalForm').classList.add('hidden');
        await cargar();
        Swal.fire({ icon: 'success', title: 'Guardado', toast: true, position: 'top-end',
            showConfirmButton: false, timer: 2000 });
    } catch {
        Swal.fire({ icon: 'error', title: 'Error al guardar', toast: true, position: 'top-end',
            showConfirmButton: false, timer: 3000 });
    }
}

async function eliminar(id) {
    const result = await Swal.fire({
        title: '¿Eliminar documento?',
        text: 'Esta accion no se puede deshacer.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        confirmButtonText: 'Eliminar',
        cancelButtonText: 'Cancelar'
    });
    if (!result.isConfirmed) return;
    try {
        const r = await fetch(`${API}/${id}`, { method: 'DELETE' });
        if (!r.ok) throw new Error(r.status);
        await cargar();
        Swal.fire({ icon: 'success', title: 'Eliminado', toast: true, position: 'top-end',
            showConfirmButton: false, timer: 2000 });
    } catch {
        Swal.fire({ icon: 'error', title: 'Error al eliminar', toast: true, position: 'top-end',
            showConfirmButton: false, timer: 3000 });
    }
}

function emitirPdf(id) {
    window.open(`${API}/${id}/pdf?inline=true`, '_blank', 'noopener');
}

cargar();
</script>
</th:block>

</body>
</html>
