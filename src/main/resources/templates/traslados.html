<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('traslados', 'EcoAdmin - Traslados', 'Gestion de traslados', ~{::pageContent}, ~{::pageScripts})}">
<body>

<th:block th:fragment="pageContent">
<main class="flex-1 p-4 sm:p-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h2 class="text-xl font-bold text-slate-900">Traslados</h2>
            <p class="text-sm text-slate-500 mt-0.5">Seguimiento y gestion de traslados</p>
        </div>
        <div class="flex gap-2 flex-wrap">
            <button type="button" onclick="abrirQr()"
                    class="btn btn-sm bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 normal-case shrink-0">
                <svg class="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7V5a2 2 0 012-2h2M3 17v2a2 2 0 002 2h2m10-18h2a2 2 0 012 2v2m0 10v2a2 2 0 01-2 2h-2M7 7h4v4H7V7zm0 6h4v4H7v-4zm6 0h4v4h-4v-4zm0-6h4v4h-4V7z"/></svg>
                Leer QR
            </button>
            <button type="button" onclick="abrirCrear()"
                    class="btn bg-[#3b82f6] hover:bg-[#2563eb] text-white border-none normal-case shrink-0 shadow-md">
                + Nuevo Traslado
            </button>
        </div>
    </div>


    <!-- Vista Kanban -->
    <div id="kanbanView" class="mt-2">
        <div class="grid grid-cols-2 xl:grid-cols-4 gap-4">
            <!-- Columna PENDIENTE -->
            <div class="flex flex-col gap-2">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-3 h-3 rounded-full bg-slate-400 shrink-0"></span>
                    <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Pendiente</span>
                    <span id="kCount_PENDIENTE" class="ml-auto text-xs bg-slate-100 text-slate-500 rounded-full px-2 py-0.5">0</span>
                </div>
                <div id="kCol_PENDIENTE" data-estado="PENDIENTE"
                     class="kanban-col flex flex-col gap-2 min-h-[120px] bg-slate-50 rounded-xl p-2 border border-slate-200"></div>
            </div>
            <!-- Columna EN_TRANSITO -->
            <div class="flex flex-col gap-2">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-3 h-3 rounded-full bg-blue-400 shrink-0"></span>
                    <span class="text-xs font-semibold uppercase tracking-wide text-blue-600">En Transito</span>
                    <span id="kCount_EN_TRANSITO" class="ml-auto text-xs bg-blue-50 text-blue-500 rounded-full px-2 py-0.5">0</span>
                </div>
                <div id="kCol_EN_TRANSITO" data-estado="EN_TRANSITO"
                     class="kanban-col flex flex-col gap-2 min-h-[120px] bg-blue-50/50 rounded-xl p-2 border border-blue-100"></div>
            </div>
            <!-- Columna ENTREGADO -->
            <div class="flex flex-col gap-2">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-3 h-3 rounded-full bg-amber-400 shrink-0"></span>
                    <span class="text-xs font-semibold uppercase tracking-wide text-amber-600">Entregado</span>
                    <span id="kCount_ENTREGADO" class="ml-auto text-xs bg-amber-50 text-amber-500 rounded-full px-2 py-0.5">0</span>
                </div>
                <div id="kCol_ENTREGADO" data-estado="ENTREGADO"
                     class="kanban-col flex flex-col gap-2 min-h-[120px] bg-amber-50/50 rounded-xl p-2 border border-amber-100"></div>
            </div>
            <!-- Columna COMPLETADO -->
            <div class="flex flex-col gap-2">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-3 h-3 rounded-full bg-emerald-400 shrink-0"></span>
                    <span class="text-xs font-semibold uppercase tracking-wide text-emerald-600">Completado</span>
                    <span id="kCount_COMPLETADO" class="ml-auto text-xs bg-emerald-50 text-emerald-500 rounded-full px-2 py-0.5">0</span>
                </div>
                <div id="kCol_COMPLETADO" data-estado="COMPLETADO"
                     class="kanban-col flex flex-col gap-2 min-h-[120px] bg-emerald-50/50 rounded-xl p-2 border border-emerald-100"></div>
            </div>
        </div>
    </div>
</main>

<!-- MODAL FORM -->
<div id="modalForm" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
    <div class="relative p-4 w-full max-w-2xl">
        <div class="relative bg-white rounded-2xl shadow-xl">
            <div class="flex items-center justify-between p-5 border-b border-slate-100">
                <h3 id="modalTitulo" class="text-base font-semibold text-slate-900">Nuevo Traslado</h3>
                <button th:replace="~{layouts/fragments :: modalCloseBtn('modalForm')}"></button>
            </div>
            <div class="p-5">
                <input type="hidden" id="itemId">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Centro Productor *</label>
                        <div class="flex gap-1">
                            <select id="fProductor" class="form-control-eco"><option value="">Seleccionar...</option></select>
                            <button type="button" onclick="abrirCrearCentroRapido('fProductor')" class="btn btn-sm btn-outline border-slate-300 px-2" title="Crear centro">+</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Centro Gestor *</label>
                        <div class="flex gap-1">
                            <select id="fGestor" class="form-control-eco"><option value="">Seleccionar...</option></select>
                            <button type="button" onclick="abrirCrearCentroRapido('fGestor')" class="btn btn-sm btn-outline border-slate-300 px-2" title="Crear centro">+</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Residuo *</label>
                        <select id="fResiduo" class="form-control-eco"><option value="">Seleccionar...</option></select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Transportista</label>
                        <select id="fTransportista" class="form-control-eco"><option value="">Sin asignar</option></select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Observaciones</label>
                    <textarea id="fObservaciones" class="form-control-eco" rows="2" placeholder="Notas adicionales..."></textarea>
                </div>
            </div>
            <div th:replace="~{layouts/fragments :: modalFooter('modalForm', 'Guardar', 'guardar')}"></div>
        </div>
    </div>
</div>

<!-- MODAL ESTADO -->
<div id="modalEstado" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
    <div class="relative p-4 w-full max-w-md">
        <div class="relative bg-white rounded-2xl shadow-xl">
            <div class="flex items-center justify-between p-5 border-b border-slate-100">
                <h3 class="text-base font-semibold text-slate-900">Cambiar Estado</h3>
                <button th:replace="~{layouts/fragments :: modalCloseBtn('modalEstado')}"></button>
            </div>
            <div class="p-5 space-y-4">
                <input type="hidden" id="estadoTrasladoId">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nuevo Estado</label>
                    <select id="nuevoEstado" class="form-control-eco">
                        <option value="PENDIENTE">PENDIENTE</option>
                        <option value="EN_TRANSITO">EN TRANSITO</option>
                        <option value="ENTREGADO">ENTREGADO</option>
                        <option value="COMPLETADO">COMPLETADO</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Comentario</label>
                    <textarea id="comentarioEstado" class="form-control-eco" rows="2" placeholder="Motivo del cambio..."></textarea>
                </div>
            </div>
            <div th:replace="~{layouts/fragments :: modalFooter('modalEstado', 'Aplicar', 'cambiarEstado')}"></div>
        </div>
    </div>
</div>

<!-- MODAL HISTORIAL -->
<div id="modalHistorial" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
    <div class="relative p-4 w-full max-w-2xl">
        <div class="relative bg-white rounded-2xl shadow-xl">
            <div class="flex items-center justify-between p-5 border-b border-slate-100">
                <h3 class="text-base font-semibold text-slate-900">Historial de eventos</h3>
                <button th:replace="~{layouts/fragments :: modalCloseBtn('modalHistorial')}"></button>
            </div>
            <div class="p-5 max-h-96 overflow-y-auto" id="contenidoHistorial">
                <p class="text-slate-400">Cargando...</p>
            </div>
        </div>
    </div>
</div>

<!-- MODAL QR -->
<div id="modalQr" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
    <div class="relative p-4 w-full max-w-md">
        <div class="relative bg-white rounded-2xl shadow-xl">
            <div class="flex items-center justify-between p-5 border-b border-slate-100">
                <h3 class="text-base font-semibold text-slate-900">Leer Codigo QR</h3>
                <button th:replace="~{layouts/fragments :: modalCloseBtn('modalQr')}"></button>
            </div>
            <div class="p-5 space-y-4">
                <p class="text-sm text-slate-500">Sube una imagen con un codigo QR para decodificarlo.</p>
                <div class="border-2 border-dashed border-slate-200 rounded-xl p-6 text-center">
                    <label for="qrArchivo" class="cursor-pointer flex flex-col items-center gap-2">
                        <svg class="w-10 h-10 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7V5a2 2 0 012-2h2M3 17v2a2 2 0 002 2h2m10-18h2a2 2 0 012 2v2m0 10v2a2 2 0 01-2 2h-2M7 7h4v4H7V7zm0 6h4v4H7v-4zm6 0h4v4h-4v-4zm0-6h4v4h-4V7z"/></svg>
                        <span class="text-sm font-medium text-slate-600">Seleccionar imagen con QR</span>
                        <span class="text-xs text-slate-400">PNG, JPG, GIF soportados</span>
                        <input id="qrArchivo" type="file" accept="image/*" class="hidden" onchange="leerQr()">
                    </label>
                </div>
                <div id="qrResultado" class="hidden p-3 bg-green-50 border border-green-200 rounded-lg">
                    <p class="text-xs font-semibold text-green-700 mb-1">Contenido del QR:</p>
                    <p id="qrTexto" class="text-sm text-green-800 break-all font-mono"></p>
                </div>
                <div id="qrError" class="hidden p-3 bg-red-50 border border-red-200 rounded-lg">
                    <p id="qrMensajeError" class="text-sm text-red-700"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL PDF -->
<div id="modalPdf" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
    <div class="relative p-4 w-full max-w-4xl">
        <div class="relative bg-white rounded-2xl shadow-xl">
            <div class="flex items-center justify-between p-4 border-b border-slate-100">
                <h3 id="pdfTitulo" class="text-base font-semibold text-slate-900">Documento PDF</h3>
                <div class="flex items-center gap-2">
                    <a id="pdfDescarga" href="#" class="btn btn-xs bg-[#3b82f6] hover:bg-[#2563eb] text-white border-none normal-case">Descargar</a>
                    <button th:replace="~{layouts/fragments :: modalCloseBtn('modalPdf')}"></button>
                </div>
            </div>
            <div class="p-0">
                <iframe id="pdfFrame" src="" class="w-full rounded-b-2xl" style="height:70vh;" title="PDF Viewer"></iframe>
            </div>
        </div>
    </div>
</div>
<!-- MINI MODAL: Crear Centro Rapido -->
<div id="modalCentroRapido" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-[60] flex justify-center items-center bg-black/30">
    <div class="relative p-4 w-full max-w-md">
        <div class="relative bg-white rounded-2xl shadow-xl">
            <div class="flex items-center justify-between p-5 border-b border-slate-100">
                <h3 class="text-base font-semibold text-slate-900">Nuevo Centro</h3>
                <button type="button" onclick="cerrarCrearCentroRapido()" class="text-slate-400 hover:text-slate-700 rounded-lg p-1.5 hover:bg-slate-100"><svg class="w-4 h-4" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg></button>
            </div>
            <div class="p-5 space-y-3">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nombre *</label>
                    <input type="text" id="crNombre" class="form-control-eco" placeholder="Nombre del centro">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Tipo</label>
                    <select id="crTipo" class="form-control-eco">
                        <option value="PRODUCTOR">Productor</option>
                        <option value="GESTOR">Gestor</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">NIMA</label>
                    <input type="text" id="crNima" class="form-control-eco" placeholder="Opcional">
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 p-5 border-t border-slate-100">
                <button type="button" onclick="cerrarCrearCentroRapido()" class="btn btn-ghost btn-sm normal-case">Cancelar</button>
                <button type="button" onclick="guardarCentroRapido()" class="btn btn-sm bg-[#3b82f6] hover:bg-[#2563eb] text-white border-none normal-case px-6 shadow">Crear Centro</button>
            </div>
        </div>
    </div>
</div>

</th:block>

<th:block th:fragment="pageScripts">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script>
var todos = [], pagina = 1, filtro = '';
var POR_PAGINA = 15;
var mForm, mEstado, mHistorial, mQr, mPdf;
var sortableInstances = [];

function initModales() {
    var ids = ['modalForm','modalEstado','modalHistorial','modalQr','modalPdf'];
    var modals = ids.map(function(id) {
        var el = document.getElementById(id);
        return (el && typeof Modal !== 'undefined') ? new Modal(el, { backdrop:'dynamic', closable:true }) : null;
    });
    mForm = modals[0]; mEstado = modals[1]; mHistorial = modals[2]; mQr = modals[3]; mPdf = modals[4];
}

document.addEventListener('DOMContentLoaded', function() { initModales(); cargar(); poblarSelects(); });

var estadoBadge = { PENDIENTE:'badge-warning', EN_TRANSITO:'badge-info', ENTREGADO:'badge-success', COMPLETADO:'badge-ghost' };

async function poblarSelects() {
    var results = await Promise.all([
        fetch('/api/centros').then(function(r) { return r.json(); }),
        fetch('/api/residuos').then(function(r) { return r.json(); }),
        fetch('/api/usuarios').then(function(r) { return r.json(); })
    ]);
    var centros = results[0], residuos = results[1], usuarios = results[2];
    var centroOpts = centros.map(function(c) { return '<option value="' + c.id + '">' + esc(c.nombre) + '</option>'; }).join('');
    var residuoOpts = residuos.map(function(r) { return '<option value="' + r.id + '">' + esc(r.codigoLER || String(r.id)) + '</option>'; }).join('');
    var userOpts = usuarios.map(function(u) { return '<option value="' + u.id + '">' + esc(u.nombre) + '</option>'; }).join('');
    document.getElementById('fProductor').innerHTML = '<option value="">Seleccionar...</option>' + centroOpts;
    document.getElementById('fGestor').innerHTML = '<option value="">Seleccionar...</option>' + centroOpts;
    document.getElementById('fResiduo').innerHTML = '<option value="">Seleccionar...</option>' + residuoOpts;
    document.getElementById('fTransportista').innerHTML = '<option value="">Sin asignar</option>' + userOpts;
}

async function cargar() {
    try {
        var res = await fetch('/api/traslados');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        todos = Array.isArray(data) ? data : [];
    } catch (err) {
        document.getElementById('kanbanView').innerHTML =
            '<p class="text-center py-12 text-red-400">Error al cargar datos. Recarga la página.</p>';
        return;
    }
    renderKanban();
}

function abrirCrear() {
    document.getElementById('modalTitulo').textContent = 'Nuevo Traslado';
    document.getElementById('itemId').value = '';
    document.getElementById('fObservaciones').value = '';
    ['fProductor','fGestor','fResiduo','fTransportista'].forEach(function(id) { document.getElementById(id).value = ''; });
    mForm && mForm.show();
}

async function abrirEditar(id) {
    var t = await fetch('/api/traslados/' + id).then(function(r) { return r.json(); });
    document.getElementById('modalTitulo').textContent = 'Editar Traslado';
    document.getElementById('itemId').value = t.id;
    document.getElementById('fProductor').value = t.centroProductor ? t.centroProductor.id : '';
    document.getElementById('fGestor').value = t.centroGestor ? t.centroGestor.id : '';
    document.getElementById('fResiduo').value = t.residuo ? t.residuo.id : '';
    document.getElementById('fTransportista').value = t.transportista ? t.transportista.id : '';
    document.getElementById('fObservaciones').value = t.observaciones || '';
    mForm && mForm.show();
}

async function guardar() {
    var id = document.getElementById('itemId').value;
    var productorId = parseInt(document.getElementById('fProductor').value);
    var gestorId = parseInt(document.getElementById('fGestor').value);
    var residuoId = parseInt(document.getElementById('fResiduo').value);
    if (!productorId || !gestorId || !residuoId) {
        Swal.fire({ icon: 'warning', title: 'Campos requeridos', text: 'Selecciona Centro Productor, Centro Gestor y Residuo.' });
        return;
    }
    var body = {
        centroProductor: { id: productorId },
        centroGestor: { id: gestorId },
        residuo: { id: residuoId },
        observaciones: document.getElementById('fObservaciones').value.trim()
    };
    var transpId = parseInt(document.getElementById('fTransportista').value);
    if (transpId) body.transportista = { id: transpId };
    var res = await fetch(id ? '/api/traslados/' + id : '/api/traslados', {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (res.ok) { mForm && mForm.hide(); await cargar(); }
    else { Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo guardar el traslado.' }); }
}

function abrirEstado(id) {
    document.getElementById('estadoTrasladoId').value = id;
    document.getElementById('nuevoEstado').value = 'PENDIENTE';
    document.getElementById('comentarioEstado').value = '';
    mEstado && mEstado.show();
}

async function cambiarEstado() {
    var id = document.getElementById('estadoTrasladoId').value;
    var est = document.getElementById('nuevoEstado').value;
    var com = document.getElementById('comentarioEstado').value.trim();
    var url = '/api/traslados/' + id + '/estado?estado=' + encodeURIComponent(est) + (com ? '&comentario=' + encodeURIComponent(com) : '');
    var res = await fetch(url, { method: 'PATCH' });
    if (res.ok) { mEstado && mEstado.hide(); await cargar(); }
    else { Swal.fire({ icon:'error', title:'Error', text:'No se pudo cambiar el estado.' }); }
}

async function verHistorial(id) {
    var eventos = await fetch('/api/traslados/' + id + '/historial').then(function(r) { return r.json(); });
    var div = document.getElementById('contenidoHistorial');
    if (!eventos || eventos.length === 0) {
        div.innerHTML = '<p class="text-slate-400 text-sm">Sin eventos registrados.</p>';
    } else {
        div.innerHTML = '<ol class="relative border-l border-slate-200 ml-3 space-y-4">'
            + eventos.map(function(e) {
                return '<li class="ml-4">'
                    + '<div class="absolute w-3 h-3 bg-blue-200 rounded-full -left-1.5 border border-white"></div>'
                    + '<span class="badge badge-sm ' + (estadoBadge[e.estado] || 'badge-ghost') + ' mb-1">' + esc(e.estado) + '</span>'
                    + '<p class="text-xs text-slate-400">' + (e.fechaEvento ? new Date(e.fechaEvento).toLocaleString('es-ES') : '') + '</p>'
                    + (e.comentario ? '<p class="text-sm text-slate-600 mt-0.5">' + esc(e.comentario) + '</p>' : '')
                    + '</li>';
            }).join('')
            + '</ol>';
    }
    mHistorial && mHistorial.show();
}

async function pedirBorrar(id) {
    var result = await Swal.fire({
        title: 'Eliminar traslado?',
        text: 'Se eliminara junto con su historial de eventos.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonText: 'Cancelar',
        confirmButtonText: 'Eliminar'
    });
    if (!result.isConfirmed) return;
    var res = await fetch('/api/traslados/' + id, { method: 'DELETE' });
    if (res.ok || res.status === 204) { await cargar(); }
    else {
        var data = await res.json().catch(function() { return {}; });
        Swal.fire({ icon:'error', title:'No se puede eliminar', text: data.error || 'Error al eliminar.' });
    }
}

function abrirQr() {
    document.getElementById('qrArchivo').value = '';
    document.getElementById('qrResultado').classList.add('hidden');
    document.getElementById('qrError').classList.add('hidden');
    mQr && mQr.show();
}

async function leerQr() {
    var input = document.getElementById('qrArchivo');
    if (!input.files || !input.files[0]) return;
    var form = new FormData();
    form.append('archivo', input.files[0]);
    document.getElementById('qrResultado').classList.add('hidden');
    document.getElementById('qrError').classList.add('hidden');
    try {
        var res = await fetch('/api/qr/leer', { method: 'POST', body: form });
        var data = await res.json();
        if (res.ok) {
            document.getElementById('qrTexto').textContent = data.contenido;
            document.getElementById('qrResultado').classList.remove('hidden');
        } else {
            document.getElementById('qrMensajeError').textContent = data.error || 'No se pudo leer el QR.';
            document.getElementById('qrError').classList.remove('hidden');
        }
    } catch(ex) {
        document.getElementById('qrMensajeError').textContent = 'Error de conexion al servidor.';
        document.getElementById('qrError').classList.remove('hidden');
    }
}

var pdfLabels = { 'carta-porte':'Carta de Porte', 'notificacion':'Notificacion', 'certificado':'Certificado' };

function verPdf(id, tipo) {
    var label = pdfLabels[tipo] || tipo;
    document.getElementById('pdfTitulo').textContent = label + ' \u2014 Traslado #' + id;
    document.getElementById('pdfFrame').src = '/api/traslados/' + id + '/pdf/' + tipo + '?inline=true';
    document.getElementById('pdfDescarga').href = '/api/traslados/' + id + '/pdf/' + tipo;
    mPdf && mPdf.show();
}
async function borrarSeleccionados() {
    var ids = getSeleccionados();
    if (!ids.length) return;
    var result = await Swal.fire({
        title: 'Eliminar ' + ids.length + ' traslado(s)?',
        text: 'Esta accion no se puede deshacer.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonText: 'Cancelar',
        confirmButtonText: 'Eliminar'
    });
    if (!result.isConfirmed) return;
    var errors = [];
    for (var id of ids) {
        var res = await fetch('/api/traslados/' + id, { method: 'DELETE' });
        if (!res.ok && res.status !== 204) errors.push(id);
    }
    limpiarSeleccion();
    await cargar();
    if (errors.length) Swal.fire({ icon: 'warning', title: 'Algunos no se pudieron eliminar', text: 'IDs: ' + errors.join(', ') });
}

var _crTargetSelect = '';
function abrirCrearCentroRapido(selectId) {
    _crTargetSelect = selectId;
    document.getElementById('crNombre').value = '';
    document.getElementById('crTipo').value = 'PRODUCTOR';
    document.getElementById('crNima').value = '';
    document.getElementById('modalCentroRapido').classList.remove('hidden');
}
function cerrarCrearCentroRapido() {
    document.getElementById('modalCentroRapido').classList.add('hidden');
}
async function guardarCentroRapido() {
    var nombre = document.getElementById('crNombre').value.trim();
    if (!nombre) {
        Swal.fire({ icon: 'warning', title: 'Nombre requerido', text: 'Introduce un nombre para el centro.' });
        return;
    }
    var body = {
        nombre: nombre,
        tipo: document.getElementById('crTipo').value,
        nima: document.getElementById('crNima').value.trim() || null
    };
    var res = await fetch('/api/centros', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) { Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo crear el centro.' }); return; }
    var centro = await res.json();
    await poblarSelects();
    var targetSel = document.getElementById(_crTargetSelect);
    if (targetSel) targetSel.value = centro.id;
    cerrarCrearCentroRapido();
}

/* ── Vista Kanban ── */

var ESTADOS_KANBAN = ['PENDIENTE', 'EN_TRANSITO', 'ENTREGADO', 'COMPLETADO'];

function renderKanban() {
    ESTADOS_KANBAN.forEach(function(estado) {
        var col = document.getElementById('kCol_' + estado);
        var counter = document.getElementById('kCount_' + estado);
        if (!col) return;
        var items = todos.filter(function(t) { return t.estado === estado; });
        counter.textContent = items.length;
        col.innerHTML = items.length === 0
            ? '<div class="text-xs text-slate-300 text-center py-4">Sin traslados</div>'
            : items.map(function(t) {
                var prod = (t.centroProductor && t.centroProductor.nombre) || '—';
                var gest = (t.centroGestor && t.centroGestor.nombre) || '—';
                var res = (t.residuo && t.residuo.descripcion) || '—';
                return '<div class="kanban-card bg-white rounded-lg border border-slate-200 p-3 shadow-sm cursor-grab hover:shadow-md transition-shadow select-none" data-id="' + t.id + '">'
                    + '<div class="flex items-center justify-between mb-1">'
                    + '  <span class="text-xs font-bold text-slate-400">#' + t.id + '</span>'
                    + '  <button onclick="abrirEditar(' + t.id + ');event.stopPropagation()" class="text-slate-300 hover:text-blue-500 transition-colors p-0.5 rounded">'
                    + '    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>'
                    + '  </button>'
                    + '</div>'
                    + '<p class="text-sm font-semibold text-slate-800 truncate leading-tight">' + escHtml(prod) + '</p>'
                    + '<p class="text-xs text-slate-500 truncate">→ ' + escHtml(gest) + '</p>'
                    + '<p class="text-xs text-slate-400 truncate mt-1 italic">' + escHtml(res) + '</p>'
                    + '</div>';
            }).join('');
    });

    sortableInstances.forEach(function(s) { s.destroy(); });
    sortableInstances = [];

    ESTADOS_KANBAN.forEach(function(estado) {
        var col = document.getElementById('kCol_' + estado);
        if (!col) return;
        var inst = Sortable.create(col, {
            group: 'kanban',
            animation: 150,
            ghostClass: 'opacity-40',
            dragClass: 'shadow-lg',
            onEnd: function(evt) {
                var id = evt.item.getAttribute('data-id');
                var nuevoEstado = evt.to.getAttribute('data-estado');
                var estadoAnterior = evt.from.getAttribute('data-estado');
                if (nuevoEstado === estadoAnterior) return;
                confirmarCambioEstadoKanban(parseInt(id), nuevoEstado, estadoAnterior, evt.item, evt.from, evt.oldIndex);
            }
        });
        sortableInstances.push(inst);
    });
}

async function confirmarCambioEstadoKanban(id, nuevoEstado, estadoAnterior, item, fromCol, oldIndex) {
    var result = await Swal.fire({
        title: 'Cambiar estado?',
        text: 'Mover traslado #' + id + ' a ' + nuevoEstado.replace('_', ' ') + '.',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#3b82f6',
        cancelButtonText: 'Cancelar',
        confirmButtonText: 'Confirmar'
    });
    if (!result.isConfirmed) {
        // revertir posicion visual
        var oldRef = fromCol.children[oldIndex] || null;
        fromCol.insertBefore(item, oldRef);
        return;
    }
    var url = '/api/traslados/' + id + '/estado?estado=' + encodeURIComponent(nuevoEstado);
    var res = await fetch(url, { method: 'PATCH' });
    if (res.ok) {
        var t = todos.find(function(x) { return x.id === id; });
        if (t) t.estado = nuevoEstado;
        // actualizar contadores
        ['PENDIENTE','EN_TRANSITO','ENTREGADO','COMPLETADO'].forEach(function(e) {
            var cnt = document.getElementById('kCount_' + e);
            if (cnt) cnt.textContent = todos.filter(function(x) { return x.estado === e; }).length;
        });
    } else {
        Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo cambiar el estado.' });
        var oldRef = fromCol.children[oldIndex] || null;
        fromCol.insertBefore(item, oldRef);
    }
}

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
