<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout('traslados', 'EcoAdmin — Traslados', 'Gestion de traslados', ~{::#content}, ~{::#scripts})}">
<head><title>EcoAdmin — Traslados</title></head>
<body>

<div id="content">
    <main class="flex-1 p-4 sm:p-6">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <div>
                <h2 class="text-xl font-bold text-gray-900">Traslados</h2>
                <p class="text-sm text-gray-500 mt-0.5">Seguimiento y gestion de traslados</p>
            </div>
            <button type="button" onclick="abrirCrear()" class="btn bg-[#1a6b3c] hover:bg-[#155c33] text-white border-none normal-case shrink-0">+ Nuevo Traslado</button>
        </div>
        <div class="mb-4">
            <div class="relative w-full sm:max-w-xs">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/></svg>
                <input type="text" id="busqueda" placeholder="Buscar traslados..." oninput="filtrar()" class="input input-sm w-full pl-9 bg-white border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-x-auto">
            <table class="table table-zebra table-sm w-full">
                <thead>
                    <tr class="text-xs uppercase text-gray-400 border-b border-gray-100">
                        <th class="w-12">ID</th><th>Productor</th><th>Gestor</th>
                        <th class="hidden md:table-cell">Residuo</th><th>Estado</th>
                        <th class="hidden lg:table-cell">Transportista</th><th class="text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaCuerpo">
                    <tr><td colspan="7" class="text-center py-12 text-gray-400">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mt-4">
            <span class="text-xs text-gray-500" id="infoReg"></span>
            <div class="join" id="pgBotones"></div>
        </div>
    </main>

    <!-- MODAL FORM -->
    <div id="modalForm" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
        <div class="relative p-4 w-full max-w-2xl">
            <div class="relative bg-white rounded-2xl shadow-xl">
                <div class="flex items-center justify-between p-5 border-b border-gray-100">
                    <h3 id="modalTitulo" class="text-base font-semibold">Nuevo Traslado</h3>
                    <button type="button" data-modal-hide="modalForm" class="text-gray-400 hover:text-gray-700 rounded-lg p-1.5 hover:bg-gray-100"><svg class="w-4 h-4" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg></button>
                </div>
                <div class="p-5">
                    <input type="hidden" id="itemId">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="form-control"><label class="label py-1"><span class="label-text font-medium">Centro Productor *</span></label><select id="fProductor" class="select select-bordered select-sm w-full"><option value="">Seleccionar...</option></select></div>
                        <div class="form-control"><label class="label py-1"><span class="label-text font-medium">Centro Gestor *</span></label><select id="fGestor" class="select select-bordered select-sm w-full"><option value="">Seleccionar...</option></select></div>
                        <div class="form-control"><label class="label py-1"><span class="label-text font-medium">Residuo *</span></label><select id="fResiduo" class="select select-bordered select-sm w-full"><option value="">Seleccionar...</option></select></div>
                        <div class="form-control"><label class="label py-1"><span class="label-text font-medium">Transportista</span></label><select id="fTransportista" class="select select-bordered select-sm w-full"><option value="">Sin asignar</option></select></div>
                    </div>
                    <div class="form-control"><label class="label py-1"><span class="label-text font-medium">Observaciones</span></label><textarea id="fObservaciones" class="textarea textarea-bordered textarea-sm w-full" rows="2" placeholder="Notas adicionales..."></textarea></div>
                </div>
                <div class="flex items-center justify-end gap-3 p-5 border-t border-gray-100">
                    <button type="button" data-modal-hide="modalForm" class="btn btn-ghost btn-sm normal-case">Cancelar</button>
                    <button type="button" onclick="guardar()" class="btn btn-sm bg-[#1a6b3c] hover:bg-[#155c33] text-white border-none normal-case px-6">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL ESTADO -->
    <div id="modalEstado" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
        <div class="relative p-4 w-full max-w-md">
            <div class="relative bg-white rounded-2xl shadow-xl">
                <div class="flex items-center justify-between p-5 border-b border-gray-100">
                    <h3 class="text-base font-semibold">Cambiar Estado</h3>
                    <button type="button" data-modal-hide="modalEstado" class="text-gray-400 hover:text-gray-700 rounded-lg p-1.5 hover:bg-gray-100"><svg class="w-4 h-4" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg></button>
                </div>
                <div class="p-5 space-y-4">
                    <input type="hidden" id="estadoTrasladoId">
                    <div class="form-control"><label class="label py-1"><span class="label-text font-medium">Nuevo Estado</span></label>
                        <select id="nuevoEstado" class="select select-bordered select-sm w-full">
                            <option value="PENDIENTE">PENDIENTE</option>
                            <option value="EN_TRANSITO">EN TRANSITO</option>
                            <option value="ENTREGADO">ENTREGADO</option>
                            <option value="COMPLETADO">COMPLETADO</option>
                        </select>
                    </div>
                    <div class="form-control"><label class="label py-1"><span class="label-text font-medium">Comentario</span></label><textarea id="comentarioEstado" class="textarea textarea-bordered textarea-sm w-full" rows="2" placeholder="Motivo del cambio..."></textarea></div>
                </div>
                <div class="flex items-center justify-end gap-3 p-5 border-t border-gray-100">
                    <button type="button" data-modal-hide="modalEstado" class="btn btn-ghost btn-sm normal-case">Cancelar</button>
                    <button type="button" onclick="cambiarEstado()" class="btn btn-sm bg-[#1a6b3c] hover:bg-[#155c33] text-white border-none normal-case px-6">Aplicar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL HISTORIAL -->
    <div id="modalHistorial" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
        <div class="relative p-4 w-full max-w-2xl">
            <div class="relative bg-white rounded-2xl shadow-xl">
                <div class="flex items-center justify-between p-5 border-b border-gray-100">
                    <h3 class="text-base font-semibold">Historial de eventos</h3>
                    <button type="button" data-modal-hide="modalHistorial" class="text-gray-400 hover:text-gray-700 rounded-lg p-1.5 hover:bg-gray-100"><svg class="w-4 h-4" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg></button>
                </div>
                <div class="p-5 max-h-96 overflow-y-auto" id="contenidoHistorial"><p class="text-base-content/50">Cargando...</p></div>
            </div>
        </div>
    </div>

    <!-- MODAL BORRAR -->
    <div id="modalBorrar" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center bg-black/20">
        <div class="relative p-4 w-full max-w-sm">
            <div class="relative bg-white rounded-2xl shadow-xl p-6 text-center">
                <button type="button" data-modal-hide="modalBorrar" class="absolute top-3 right-3 text-gray-400 hover:text-gray-700 rounded-lg p-1 hover:bg-gray-100"><svg class="w-4 h-4" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg></button>
                <div class="text-5xl mb-3">🗑️</div>
                <h6 class="text-base font-bold mb-1">Eliminar traslado?</h6>
                <p class="text-gray-500 text-sm mb-5">Se eliminara junto con su historial de eventos.</p>
                <div class="flex justify-center gap-3">
                    <button type="button" data-modal-hide="modalBorrar" class="btn btn-sm btn-outline normal-case">Cancelar</button>
                    <button type="button" onclick="borrar()" class="btn btn-sm btn-error text-white normal-case">Eliminar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="scripts">
<script>
let todos = [], borrandoId, pagina = 1, filtro = '';
const POR_PAGINA = 15;
let mForm, mEstado, mHistorial, mBorrar;

function initModales() {
    const ids = ['modalForm','modalEstado','modalHistorial','modalBorrar'];
    [mForm, mEstado, mHistorial, mBorrar] = ids.map(id => {
        const el = document.getElementById(id);
        return (el && typeof Modal !== 'undefined') ? new Modal(el, { backdrop:'dynamic', closable:true }) : null;
    });
}

document.addEventListener('DOMContentLoaded', () => { initModales(); cargar(); poblarSelects(); });
document.addEventListener('htmx:afterSwap',   () => { initModales(); if (document.getElementById('tablaCuerpo')) cargar(); });

async function poblarSelects() {
    const [centros, residuos, usuarios] = await Promise.all([
        fetch('/api/centros').then(r => r.json()),
        fetch('/api/residuos').then(r => r.json()),
        fetch('/api/usuarios').then(r => r.json()),
    ]);
    const centroOpts  = centros.map(c  => `<option value="${c.id}">${c.nombre}</option>`).join('');
    const residuoOpts = residuos.map(r => `<option value="${r.id}">${r.codigoLER || r.id}</option>`).join('');
    const userOpts    = usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
    document.getElementById('fProductor').innerHTML    = `<option value="">Seleccionar...</option>${centroOpts}`;
    document.getElementById('fGestor').innerHTML       = `<option value="">Seleccionar...</option>${centroOpts}`;
    document.getElementById('fResiduo').innerHTML      = `<option value="">Seleccionar...</option>${residuoOpts}`;
    document.getElementById('fTransportista').innerHTML = `<option value="">Sin asignar</option>${userOpts}`;
}

async function cargar() {
    const res = await fetch('/api/traslados');
    todos = await res.json();
    pagina = 1;
    renderTabla();
}

function filtrar() { filtro = document.getElementById('busqueda').value.toLowerCase(); pagina = 1; renderTabla(); }

const estadoBadge = { PENDIENTE:'badge-warning', EN_TRANSITO:'badge-info', ENTREGADO:'badge-success', COMPLETADO:'badge-ghost' };

function renderTabla() {
    const lista = todos.filter(t =>
        (t.centroProductor?.nombre || '').toLowerCase().includes(filtro) ||
        (t.centroGestor?.nombre   || '').toLowerCase().includes(filtro) ||
        (t.estado                 || '').toLowerCase().includes(filtro)
    );
    const inicio = (pagina - 1) * POR_PAGINA;
    const slice = lista.slice(inicio, inicio + POR_PAGINA);
    const total = lista.length;
    const totalPags = Math.max(1, Math.ceil(total / POR_PAGINA));
    document.getElementById('infoReg').textContent = total === 0 ? 'Sin registros' : `Mostrando ${inicio + 1}–${Math.min(inicio + POR_PAGINA, total)} de ${total}`;
    document.getElementById('tablaCuerpo').innerHTML = slice.length === 0
        ? `<tr><td colspan="7" class="text-center py-12 text-gray-400">Sin resultados</td></tr>`
        : slice.map(t => `<tr class="hover"><td class="text-xs text-gray-400">${t.id}</td><td class="font-medium text-sm">${t.centroProductor?.nombre || '—'}</td><td class="text-sm">${t.centroGestor?.nombre || '—'}</td><td class="text-sm text-gray-500 hidden md:table-cell">${t.residuo?.codigoLER || t.residuo?.id || '—'}</td><td><span class="badge badge-sm ${estadoBadge[t.estado] || 'badge-ghost'}">${t.estado || '—'}</span></td><td class="text-sm text-gray-500 hidden lg:table-cell">${t.transportista?.nombre || '—'}</td><td class="text-right whitespace-nowrap"><button class="btn btn-ghost btn-xs" onclick="abrirEditar(${t.id})" title="Editar">✏️</button><button class="btn btn-ghost btn-xs" onclick="abrirEstado(${t.id})" title="Cambiar estado">⚡</button><button class="btn btn-ghost btn-xs" onclick="verHistorial(${t.id})" title="Historial">📋</button><button class="btn btn-ghost btn-xs text-error" onclick="pedirBorrar(${t.id})" title="Eliminar">🗑️</button></td></tr>`).join('');
    document.getElementById('pgBotones').innerHTML = Array.from({ length: totalPags }, (_, i) => i + 1)
        .map(i => `<button class="join-item btn btn-xs ${i === pagina ? 'bg-[#1a6b3c] text-white border-none' : ''}" onclick="irPagina(${i})">${i}</button>`).join('');
}

function irPagina(n) { pagina = n; renderTabla(); }

function abrirCrear() {
    document.getElementById('modalTitulo').textContent = 'Nuevo Traslado';
    document.getElementById('itemId').value = '';
    document.getElementById('fObservaciones').value = '';
    ['fProductor','fGestor','fResiduo','fTransportista'].forEach(id => document.getElementById(id).value = '');
    mForm?.show();
}

async function abrirEditar(id) {
    const t = await fetch(`/api/traslados/${id}`).then(r => r.json());
    document.getElementById('modalTitulo').textContent = 'Editar Traslado';
    document.getElementById('itemId').value = t.id;
    document.getElementById('fProductor').value = t.centroProductor?.id || '';
    document.getElementById('fGestor').value = t.centroGestor?.id || '';
    document.getElementById('fResiduo').value = t.residuo?.id || '';
    document.getElementById('fTransportista').value = t.transportista?.id || '';
    document.getElementById('fObservaciones').value = t.observaciones || '';
    mForm?.show();
}

async function guardar() {
    const id = document.getElementById('itemId').value;
    const body = {
        centroProductor: { id: parseInt(document.getElementById('fProductor').value) },
        centroGestor:    { id: parseInt(document.getElementById('fGestor').value) },
        residuo:         { id: parseInt(document.getElementById('fResiduo').value) },
        observaciones:   document.getElementById('fObservaciones').value.trim(),
    };
    const transpId = document.getElementById('fTransportista').value;
    if (transpId) body.transportista = { id: parseInt(transpId) };
    const res = await fetch(id ? `/api/traslados/${id}` : '/api/traslados', {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (res.ok) { mForm?.hide(); await cargar(); }
    else { alert('Error al guardar el traslado.'); }
}

function abrirEstado(id) {
    document.getElementById('estadoTrasladoId').value = id;
    document.getElementById('nuevoEstado').value = 'PENDIENTE';
    document.getElementById('comentarioEstado').value = '';
    mEstado?.show();
}

async function cambiarEstado() {
    const id = document.getElementById('estadoTrasladoId').value;
    const body = { nuevoEstado: document.getElementById('nuevoEstado').value, comentario: document.getElementById('comentarioEstado').value.trim() };
    const res = await fetch(`/api/traslados/${id}/estado`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (res.ok) { mEstado?.hide(); await cargar(); }
    else { alert('Error al cambiar el estado.'); }
}

async function verHistorial(id) {
    const eventos = await fetch(`/api/traslados/${id}/historial`).then(r => r.json());
    const div = document.getElementById('contenidoHistorial');
    if (!eventos || eventos.length === 0) {
        div.innerHTML = '<p class="text-gray-400 text-sm">Sin eventos registrados.</p>';
    } else {
        div.innerHTML = `<ol class="relative border-l border-gray-200 ml-3 space-y-4">` +
            eventos.map(e => `<li class="ml-4"><div class="absolute w-3 h-3 bg-green-200 rounded-full -left-1.5 border border-white"></div><span class="badge badge-sm ${estadoBadge[e.estado] || 'badge-ghost'} mb-1">${e.estado}</span><p class="text-xs text-gray-400">${e.fechaEvento ? new Date(e.fechaEvento).toLocaleString('es-ES') : ''}</p>${e.comentario ? `<p class="text-sm text-gray-600 mt-0.5">${e.comentario}</p>` : ''}</li>`).join('') +
            `</ol>`;
    }
    mHistorial?.show();
}

function pedirBorrar(id) { borrandoId = id; mBorrar?.show(); }

async function borrar() {
    const res = await fetch(`/api/traslados/${borrandoId}`, { method: 'DELETE' });
    if (res.ok || res.status === 204) { mBorrar?.hide(); await cargar(); }
}
</script>
</div>

</body>
</html>
