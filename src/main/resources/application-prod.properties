# ============================================================
# Perfil de PRODUCCION - PostgreSQL
# ============================================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ecoadmin}
spring.datasource.username=${DATABASE_USER:ecoadmin}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Primer despliegue en PostgreSQL sin migraciones versionadas todavía
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
ecoadmin.mail.from=${MAIL_USERNAME:noreply@ecoadmin.com}

# Admin
ecoadmin.admin.email=${ADMIN_EMAIL:admin@ecoadmin.com}
ecoadmin.admin.password=${ADMIN_PASSWORD:}
